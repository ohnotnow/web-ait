<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ait-web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #141929;
      --surface-hover: #1a2035;
      --border: #1e2640;
      --text: #c8cdd8;
      --text-muted: #636d83;
      --text-dim: #3d4660;
      --accent: #5b8af0;
      --header-bg: #0d1120;

      --status-open: #636d83;
      --status-progress: #e0a344;
      --status-closed: #4cae6a;
      --status-cancelled: #8b5c5c;

      --p0: #e05555; --p0-bg: rgba(224,85,85,0.12);
      --p1: #e0a344; --p1-bg: rgba(224,163,68,0.12);
      --p2: #c4b44e; --p2-bg: rgba(196,180,78,0.10);
      --p3: #5b8af0; --p3-bg: rgba(91,138,240,0.10);
      --p4: #636d83; --p4-bg: rgba(99,109,131,0.08);

      --count-open: #5b8af0; --count-open-bg: rgba(91,138,240,0.12);
      --count-progress: #e0a344; --count-progress-bg: rgba(224,163,68,0.12);
      --count-closed: #4cae6a; --count-closed-bg: rgba(76,174,106,0.10);
      --count-ready: #a07de0; --count-ready-bg: rgba(160,125,224,0.10);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #eef0f4;
        --surface: #ffffff;
        --surface-hover: #f6f7f9;
        --border: #d8dce6;
        --text: #2a2f3a;
        --text-muted: #7a8294;
        --text-dim: #b0b6c4;
        --accent: #4070d6;
        --header-bg: #e4e7ed;

        --status-open: #7a8294;
        --status-progress: #c48a20;
        --status-closed: #2e8b4a;
        --status-cancelled: #9e6060;

        --p0: #d03030; --p0-bg: rgba(208,48,48,0.08);
        --p1: #c48a20; --p1-bg: rgba(196,138,32,0.08);
        --p2: #9e8e20; --p2-bg: rgba(158,142,32,0.06);
        --p3: #4070d6; --p3-bg: rgba(64,112,214,0.06);
        --p4: #7a8294; --p4-bg: rgba(122,130,148,0.06);

        --count-open: #4070d6; --count-open-bg: rgba(64,112,214,0.08);
        --count-progress: #c48a20; --count-progress-bg: rgba(196,138,32,0.08);
        --count-closed: #2e8b4a; --count-closed-bg: rgba(46,139,74,0.08);
        --count-ready: #7c50c4; --count-ready-bg: rgba(124,80,196,0.08);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'IBM Plex Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    .header-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--status-closed);
      flex-shrink: 0;
    }

    .header-status.disconnected {
      background: var(--p0);
      animation: blink 1s ease-in-out infinite;
    }

    /* ── Board ── */
    .board {
      flex: 1;
      display: flex;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 0;
    }

    .column {
      flex: 1 1 0;
      min-width: 220px;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .column:last-child {
      border-right: none;
    }

    .column-header {
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      min-height: 2.2rem;
    }

    .column-status {
      font-size: 0.7rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .column-title {
      font-weight: 600;
      font-size: 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .column-priority {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .column-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .column-tasks {
      flex: 1;
      overflow-y: auto;
      padding: 0.35rem 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .column-tasks::-webkit-scrollbar { width: 4px; }
    .column-tasks::-webkit-scrollbar-track { background: transparent; }
    .column-tasks::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Task items ── */
    .task {
      padding: 0.3rem 0.75rem;
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
      font-size: 0.75rem;
      line-height: 1.35;
      transition: background 0.15s ease;
    }

    .task:hover {
      background: var(--surface-hover);
    }

    .task-status {
      flex-shrink: 0;
      font-size: 0.65rem;
      line-height: 1;
      width: 1em;
      text-align: center;
    }

    .task-title {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-priority {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      font-weight: 600;
      padding: 0.05rem 0.25rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .task-claimed {
      display: block;
      padding: 0 0.75rem 0.2rem 1.85rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    /* Status colours */
    .s-open { color: var(--status-open); }
    .s-in_progress { color: var(--status-progress); }
    .s-closed { color: var(--status-closed); }
    .s-cancelled { color: var(--status-cancelled); }

    .s-in_progress.task-status {
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* Priority colours */
    .pr-P0 { color: var(--p0); background: var(--p0-bg); }
    .pr-P1 { color: var(--p1); background: var(--p1-bg); }
    .pr-P2 { color: var(--p2); background: var(--p2-bg); }
    .pr-P3 { color: var(--p3); background: var(--p3-bg); }
    .pr-P4 { color: var(--p4); background: var(--p4-bg); }

    /* Task row dimming for closed/cancelled */
    .task-closed { opacity: 0.4; }
    .task-cancelled { opacity: 0.3; text-decoration: line-through; }

    /* Sub-group tasks (tasks with children, e.g. phase tasks) */
    .task-group {
      font-weight: 500;
      margin-top: 0.25rem;
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
    }

    .task-group:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: none;
    }

    .task-group-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Transitions ── */
    .task, .task-claimed {
      transition: opacity 0.6s ease, background 0.15s ease;
    }
    .column-header {
      transition: opacity 0.6s ease;
    }
    .column-status, .task-status {
      transition: color 0.4s ease;
    }
    .column-count {
      transition: color 0.4s ease;
    }
    /* Dim entire column header when epic is closed */
    .column-header-closed {
      opacity: 0.4;
    }

    /* ── Animations ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── Collapsed completed columns ── */
    .column.collapsed {
      flex: 0 0 48px;
      min-width: 48px;
      max-width: 48px;
      cursor: pointer;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease;
    }

    .column.collapsed .column-tasks {
      opacity: 0;
      height: 0;
      overflow: hidden;
      padding: 0;
      transition: opacity 0.3s ease;
    }

    .column.collapsed .column-header {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      padding: 0.6rem 0.3rem;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      height: 100%;
      justify-content: flex-start;
    }

    .column.collapsed .column-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 60%;
    }

    .column.collapsed .column-priority {
      writing-mode: horizontal-tb;
    }

    .column.collapsed .column-count {
      writing-mode: horizontal-tb;
    }

    /* Expand on hover */
    .column.collapsed:hover {
      flex: 0 0 260px;
      min-width: 260px;
      max-width: 260px;
    }

    .column.collapsed:hover .column-tasks {
      opacity: 1;
      height: auto;
      padding: 0.35rem 0;
      overflow-y: auto;
    }

    .column.collapsed:hover .column-header {
      writing-mode: horizontal-tb;
      text-orientation: initial;
      padding: 0.5rem 0.75rem;
      flex-direction: row;
      height: auto;
    }

    .column.collapsed:hover .column-title {
      max-height: none;
    }

    /* Transition for non-collapsed columns */
    .column {
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease, order 0.4s ease;
    }

    /* ── Column groups (epics whose children have children) ── */
    .column-group {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease;
    }

    .column-group:last-child {
      border-right: none;
    }

    .group-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.75rem;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 1.8rem;
    }

    .group-header-closed { opacity: 0.4; }

    .group-status {
      font-size: 0.7rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .group-title {
      font-weight: 600;
      font-size: 0.7rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      color: var(--accent);
    }

    .group-priority {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .group-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .group-columns {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .group-columns > .column {
      min-width: 180px;
      max-width: none;
      border-right: 1px solid var(--border);
    }

    .group-columns > .column:last-child {
      border-right: none;
    }

    /* Collapsed group */
    .column-group.collapsed {
      flex: 0 0 48px;
      min-width: 48px;
      max-width: 48px;
      cursor: pointer;
    }

    .column-group.collapsed .group-columns {
      opacity: 0;
      height: 0;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }

    .column-group.collapsed .group-header {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      padding: 0.6rem 0.3rem;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      height: 100%;
      justify-content: flex-start;
    }

    .column-group.collapsed .group-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 60%;
    }

    .column-group.collapsed .group-priority {
      writing-mode: horizontal-tb;
    }

    .column-group.collapsed .group-count {
      writing-mode: horizontal-tb;
    }

    /* Expand group on hover */
    .column-group.collapsed:hover {
      flex: 0 0 600px;
      min-width: 600px;
      max-width: 80vw;
    }

    .column-group.collapsed:hover .group-columns {
      opacity: 1;
      height: auto;
    }

    .column-group.collapsed:hover .group-header {
      writing-mode: horizontal-tb;
      text-orientation: initial;
      padding: 0.3rem 0.75rem;
      flex-direction: row;
      height: auto;
    }

    .column-group.collapsed:hover .group-title {
      max-height: none;
    }

    /* ── Initiative banner ── */
    .initiative-banner {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.75rem;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .initiative-status {
      font-size: 0.7rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .initiative-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .initiative-title {
      font-weight: 500;
      font-size: 0.7rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      color: var(--accent);
    }

    .initiative-priority {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      font-weight: 600;
      padding: 0.05rem 0.25rem;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .initiative-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.55rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .initiative-banner-closed {
      opacity: 0.4;
    }

    /* ── Initiative section (banner + its epic columns) ── */
    .initiative-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease;
    }

    .initiative-section > .initiative-columns {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .initiative-section > .initiative-columns > .column,
    .initiative-section > .initiative-columns > .column-group {
      border-right: 1px solid var(--border);
    }

    .initiative-section > .initiative-columns > :last-child {
      border-right: none;
    }

    /* ── All-clear state ── */
    .all-clear {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1.25rem;
      color: var(--text);
    }

    .all-clear.visible {
      display: flex;
    }

    .all-clear-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--status-closed);
      box-shadow: 0 0 20px rgba(76, 174, 106, 0.35);
    }

    .all-clear-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--status-closed);
    }

    .all-clear-counts {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .all-clear-projects {
      display: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      border: 1px solid var(--accent);
      background: rgba(91,138,240,0.08);
      padding: 0.5rem 1.2rem;
      border-radius: 6px;
      transition: all 0.15s ease;
      margin-top: 1rem;
    }

    .has-multiple-projects .all-clear-projects { display: inline-block; }

    .all-clear-projects:hover {
      color: #fff;
      background: var(--accent);
    }

    /* ── Elapsed timer ── */
    .elapsed-timer {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.35rem 0.7rem;
      z-index: 100;
      display: none;
      opacity: 0.7;
      transition: opacity 0.2s ease;
    }
    .elapsed-timer:hover { opacity: 1; }
    .elapsed-timer.visible { display: block; }
    .elapsed-timer-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 0.1rem;
    }
    body.demo-mode .elapsed-timer {
      font-size: 0.95rem;
      opacity: 0.9;
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(91,138,240,0.15);
    }

    .all-clear-elapsed {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    body.demo-mode .all-clear-elapsed {
      font-size: 1.4rem;
    }

    /* ── Empty state ── */
    .empty {
      padding: 1rem 0.75rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Reconnecting overlay ── */
    .reconnecting {
      position: fixed;
      bottom: 0.75rem;
      right: 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--p0);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.6rem;
      border-radius: 3px;
      display: none;
    }

    .reconnecting.visible { display: block; }

    /* ── Summary bar ── */
    .summary-bar {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .summary-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.5rem 0.5rem;
      flex-wrap: wrap;
    }

    .summary-stats {
      display: flex;
      gap: 0.5rem;
      flex: 1;
      flex-wrap: wrap;
    }

    .summary-stat {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    /* Project name card */
    .summary-stat-project {
      position: relative;
      background: var(--header-bg);
      flex-direction: column;
      align-items: flex-start;
      gap: 0.1rem;
      min-width: 0;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .summary-stat-project:hover {
      background: var(--surface-hover);
    }

    .summary-stat-project .project-chevron {
      display: none;
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-left: 0.3rem;
      transition: transform 0.2s ease;
    }

    .has-multiple-projects .project-chevron {
      display: inline;
    }

    .sidebar-open .project-chevron {
      transform: rotate(180deg);
    }

    /* ── Project sidebar ── */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.3);
      z-index: 90;
    }

    .sidebar-overlay.visible { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.15s ease;
      font-size: 0.85rem;
      color: var(--text);
    }

    .sidebar-item:hover {
      background: var(--surface-hover);
    }

    .sidebar-item.active {
      background: rgba(91,138,240,0.1);
      color: var(--accent);
    }

    .sidebar-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-dot-active {
      background: var(--status-progress);
      animation: sidebar-pulse 2s ease-in-out infinite;
    }

    .sidebar-dot-idle { background: var(--status-open); }
    .sidebar-dot-done { background: var(--status-closed); }
    .sidebar-dot-empty { background: var(--text-dim); }

    @keyframes sidebar-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .sidebar-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-remove {
      opacity: 0;
      border: none;
      background: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.2rem;
      transition: opacity 0.15s ease, color 0.15s ease;
    }

    .sidebar-item:hover .sidebar-remove { opacity: 1; }
    .sidebar-remove:hover { color: var(--p0); }

    .sidebar-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .summary-stat-project .summary-stat-number {
      font-size: 1.6rem;
      color: var(--accent);
      white-space: normal;
      word-wrap: break-word;
      line-height: 1.1;
    }

    .summary-stat-project .summary-stat-label {
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .summary-stat-project .header-status {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
    }

    .summary-stat-number {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 4.7rem;
      font-weight: 600;
      line-height: 1;
    }

    .summary-stat-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--text-muted);
    }

    .summary-stat-open { color: var(--count-open); background: var(--count-open-bg); }
    .summary-stat-open .summary-stat-label { color: var(--count-open); opacity: 0.7; }

    .summary-stat-progress { color: var(--status-progress); background: var(--count-progress-bg); }
    .summary-stat-progress .summary-stat-label { color: var(--status-progress); opacity: 0.7; }

    .summary-stat-p0 { color: var(--p0); background: var(--p0-bg); }
    .summary-stat-p0 .summary-stat-label { color: var(--p0); opacity: 0.7; }

    .summary-stat-p0.has-p0 {
      animation: p0-pulse 2.5s ease-in-out infinite;
    }

    .summary-stat-done { color: var(--status-closed); background: var(--count-closed-bg); }
    .summary-stat-done .summary-stat-label { color: var(--status-closed); opacity: 0.7; }

    .summary-stat-ready { color: var(--count-ready); background: var(--count-ready-bg); }
    .summary-stat-ready .summary-stat-label { color: var(--count-ready); opacity: 0.7; }

    @keyframes p0-pulse {
      0%, 100% { background: rgba(224,85,85,0.12); }
      50% { background: rgba(224,85,85,0.25); }
    }

    .summary-progress {
      height: 6px;
      display: flex;
      background: var(--border);
    }

    .summary-progress-seg {
      height: 100%;
      transition: width 0.6s ease;
    }

    .summary-progress-done { background: var(--status-closed); }
    .summary-progress-wip { background: var(--status-progress); }
    .summary-progress-open { background: var(--status-open); opacity: 0.3; }

    /* ── Mini progress bars (column + group headers) ── */
    .mini-progress {
      display: inline-flex;
      width: 40px;
      height: 3px;
      border-radius: 1.5px;
      overflow: hidden;
      background: var(--border);
      flex-shrink: 0;
      vertical-align: middle;
    }

    .mini-progress-seg {
      height: 100%;
    }

    .mini-progress-done { background: var(--status-closed); }
    .mini-progress-wip { background: var(--status-progress); }
    .mini-progress-open { background: var(--status-open); opacity: 0.3; }

    /* ── P0 task attention pulse ── */
    @keyframes attention-pulse {
      0%, 100% { box-shadow: inset 3px 0 0 var(--p0); }
      50% { box-shadow: inset 3px 0 0 transparent; }
    }
    .task-attention { animation: attention-pulse 2.5s ease-in-out infinite; }

    /* ── Focus mode card ── */
    .focus-btn {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 4.7rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      border: none;
      background: var(--header-bg);
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .focus-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .focus-btn.active {
      color: var(--accent);
      background: rgba(91,138,240,0.15);
    }

    body.focus-active .task-closed,
    body.focus-active .task-cancelled { display: none; }
    /* Hide claimed spans that follow closed/cancelled tasks */
    body.focus-active .task-closed + .task-claimed,
    body.focus-active .task-cancelled + .task-claimed { display: none; }
    body.focus-active .column.collapsed,
    body.focus-active .column-group.collapsed { display: none; }

    /* When zoomed in / narrow viewport, shrink the cards */
    @media (max-width: 1400px) {
      .summary-stat-number { font-size: 2.4rem; }
      .summary-stat-label { font-size: 1rem; }
      .summary-stat-project .summary-stat-number { font-size: 1rem; }
      .summary-stat { padding: 0.3rem 0.6rem; }
      .focus-btn { font-size: 2.4rem; padding: 0.3rem 0.6rem; }
    }

    @media (max-width: 900px) {
      .summary-stat-number { font-size: 1.6rem; }
      .summary-stat-label { font-size: 0.75rem; }
      .summary-stat-project .summary-stat-number { font-size: 0.85rem; }
      .summary-stat { padding: 0.25rem 0.5rem; }
      .focus-btn { font-size: 1.6rem; padding: 0.25rem 0.5rem; }
    }

    /* ══════════════════════════════════════════════
       DEMO MODE — activated via ?demo query param
       Teams-friendly: solid colours, slow animations, no blur/glow
       ══════════════════════════════════════════════ */

    body.demo-mode {
      --bg: #080810;
      --surface: #0e0e1e;
      --surface-hover: #181833;
      --border: rgba(0, 220, 255, 0.3);
      --text: #e0e0ff;
      --text-muted: #8888bb;
      --text-dim: #5555aa;
      --accent: #00ddff;
      --header-bg: #0a0a18;

      --status-open: #7788ff;
      --status-progress: #ffaa00;
      --status-closed: #00ff88;
      --status-cancelled: #ff4466;

      --p0: #ff2244; --p0-bg: rgba(255,34,68,0.2);
      --p1: #ffaa00; --p1-bg: rgba(255,170,0,0.15);
      --p2: #dddd00; --p2-bg: rgba(221,221,0,0.12);
      --p3: #00ccff; --p3-bg: rgba(0,204,255,0.12);
      --p4: #8888bb; --p4-bg: rgba(136,136,187,0.1);

      --count-open: #00ccff; --count-open-bg: rgba(0,204,255,0.15);
      --count-progress: #ffaa00; --count-progress-bg: rgba(255,170,0,0.15);
      --count-closed: #00ff88; --count-closed-bg: rgba(0,255,136,0.12);
      --count-ready: #cc66ff; --count-ready-bg: rgba(204,102,255,0.12);
    }

    /* Solid borders — crisp over video compression */
    body.demo-mode .column {
      border-right: 2px solid var(--border);
    }
    body.demo-mode .column-header {
      border-bottom: 2px solid var(--border);
    }
    body.demo-mode .summary-bar {
      border-bottom: 2px solid var(--border);
    }
    body.demo-mode .summary-stat {
      border: 2px solid currentColor;
      border-radius: 6px;
    }
    body.demo-mode .all-clear-dot {
      box-shadow: none;
      border: 3px solid var(--status-closed);
    }
    body.demo-mode .initiative-banner {
      border-bottom: 2px solid var(--border);
    }
    body.demo-mode .group-header {
      border-bottom: 2px solid var(--border);
    }

    /* Slower transitions — fewer intermediate frames for codec */
    body.demo-mode .task,
    body.demo-mode .task-claimed {
      transition: opacity 0.8s ease, background 0.6s ease;
    }
    body.demo-mode .column-header {
      transition: opacity 0.8s ease, background 0.6s ease;
    }
    body.demo-mode .column-status,
    body.demo-mode .task-status {
      transition: color 0.8s ease;
    }
    body.demo-mode .column {
      transition: flex 0.8s ease, min-width 0.8s ease, max-width 0.8s ease;
    }
    body.demo-mode .summary-progress-seg {
      transition: width 1s ease;
    }

    /* Bolder in_progress pulse — slower, more visible */
    body.demo-mode .s-in_progress.task-status {
      animation: demo-pulse 3s ease-in-out infinite;
    }
    @keyframes demo-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    /* P0 items — solid red left border instead of box-shadow animation */
    body.demo-mode .task-attention {
      animation: none;
      border-left: 4px solid var(--p0);
    }

    /* P0 summary card pulse — bolder */
    body.demo-mode .summary-stat-p0.has-p0 {
      animation: demo-p0-pulse 3s ease-in-out infinite;
    }
    @keyframes demo-p0-pulse {
      0%, 100% { background: rgba(255,34,68,0.2); }
      50% { background: rgba(255,34,68,0.45); }
    }

    /* Task status-change flash — solid colour, instant on, fades via normal transition */
    body.demo-mode .demo-flash {
      background: rgba(0, 220, 255, 0.3) !important;
      transition: background 0s !important;
    }

    /* Epic completion burst — green flash on header */
    body.demo-mode .demo-epic-complete-flash {
      background: rgba(0, 255, 136, 0.35) !important;
      transition: background 0s !important;
    }

    /* ── Activity ticker ── */
    .activity-ticker { display: none; }

    body.demo-mode .activity-ticker {
      display: block;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: rgba(8, 8, 16, 0.97);
      border-top: 2px solid var(--accent);
      overflow-y: auto;
      padding: 0.4rem 0.75rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      z-index: 50;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    body.demo-mode .ticker-item {
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(0, 220, 255, 0.1);
      color: var(--text);
      display: flex;
      gap: 0.5rem;
      align-items: baseline;
    }

    body.demo-mode .ticker-item:first-child {
      animation: ticker-new 0.6s ease;
    }
    @keyframes ticker-new {
      from { background: rgba(0, 220, 255, 0.2); }
      to { background: transparent; }
    }

    body.demo-mode .ticker-agent {
      color: var(--accent);
      font-weight: 600;
      flex-shrink: 0;
    }
    body.demo-mode .ticker-title {
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    body.demo-mode .ticker-desc {
      color: var(--text-muted);
      flex-shrink: 0;
    }
    body.demo-mode .ticker-time {
      color: var(--text-dim);
      flex-shrink: 0;
    }
    body.demo-mode .ticker-status_change .ticker-desc { color: var(--status-progress); }
    body.demo-mode .ticker-claimed .ticker-desc { color: var(--accent); }
    body.demo-mode .ticker-epic_complete .ticker-desc { color: var(--status-closed); font-weight: 600; }
    body.demo-mode .ticker-new_task .ticker-desc { color: var(--count-open); }

    /* Push board up so ticker doesn't overlap content */
    body.demo-mode .board {
      margin-bottom: 140px;
    }
    body.demo-mode .all-clear {
      margin-bottom: 140px;
    }

    /* Ticker label */
    body.demo-mode .ticker-header {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
      padding: 0.2rem 0 0.4rem;
      border-bottom: 1px solid rgba(0, 220, 255, 0.15);
      margin-bottom: 0.2rem;
    }
  </style>
</head>
<body>
  <div class="summary-bar" id="summary-bar">
    <div class="summary-top">
      <div class="summary-stat summary-stat-project" id="project-card">
        <span class="summary-stat-number" id="project-name">—<span class="project-chevron">▼</span></span>
        <span class="summary-stat-label" id="project-time">—</span>
        <span class="header-status" id="status-dot"></span>
      </div>
      <div class="summary-stats" id="summary-stats"></div>
      <button class="focus-btn" id="focus-btn" title="Hide completed tasks and columns">focus</button>
    </div>
    <div class="summary-progress" id="summary-progress"></div>
  </div>
  <div class="board" id="board"></div>
  <div class="all-clear" id="all-clear">
    <span class="all-clear-dot"></span>
    <span class="all-clear-text">all clear</span>
    <span class="all-clear-counts" id="all-clear-counts"></span>
    <span class="all-clear-elapsed" id="all-clear-elapsed"></span>
    <button class="all-clear-projects" id="all-clear-projects">switch project</button>
  </div>
  <div class="elapsed-timer" id="elapsed-timer">
    <div class="elapsed-timer-label">elapsed</div>
    <div id="elapsed-timer-value"></div>
  </div>
  <div class="reconnecting" id="reconnecting">reconnecting&hellip;</div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Projects</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <script>
    const projectNameEl = document.getElementById("project-name");
    const projectTimeEl = document.getElementById("project-time");
    const boardEl = document.getElementById("board");
    const statusDot = document.getElementById("status-dot");
    const reconnectEl = document.getElementById("reconnecting");
    const allClearEl = document.getElementById("all-clear");
    const allClearCountsEl = document.getElementById("all-clear-counts");
    const summaryBarEl = document.getElementById("summary-bar");
    const summaryStatsEl = document.getElementById("summary-stats");
    const summaryProgressEl = document.getElementById("summary-progress");
    const focusBtnEl = document.getElementById("focus-btn");
    const projectCardEl = document.getElementById("project-card");
    const sidebarEl = document.getElementById("sidebar");
    const sidebarOverlayEl = document.getElementById("sidebar-overlay");
    const sidebarListEl = document.getElementById("sidebar-list");
    const elapsedTimerEl = document.getElementById("elapsed-timer");
    const elapsedTimerValueEl = document.getElementById("elapsed-timer-value");
    const allClearElapsedEl = document.getElementById("all-clear-elapsed");

    // ── Elapsed timer ──
    let elapsedStartTime = null;   // per-project Map: projectId -> Date
    const projectStartTimes = new Map();

    function formatElapsed(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) return `${h}h ${String(m).padStart(2, "0")}m ${String(s).padStart(2, "0")}s`;
      if (m > 0) return `${m}m ${String(s).padStart(2, "0")}s`;
      return `${s}s`;
    }

    function getProjectStartTime(issues) {
      let earliest = null;
      for (const issue of issues) {
        if (issue.claimed_at) {
          const t = new Date(issue.claimed_at);
          if (!earliest || t < earliest) earliest = t;
        }
      }
      return earliest;
    }

    function getProjectEndTime(issues) {
      let latest = null;
      for (const issue of issues) {
        const t = issue.closed_at ? new Date(issue.closed_at) : null;
        if (t && (!latest || t > latest)) latest = t;
      }
      return latest;
    }

    function updateElapsedTimer() {
      const start = projectStartTimes.get(activeProjectId);
      if (!start) {
        elapsedTimerEl.classList.remove("visible");
        return;
      }
      elapsedTimerEl.classList.add("visible");
      elapsedTimerValueEl.textContent = formatElapsed(Date.now() - start.getTime());
    }

    setInterval(updateElapsedTimer, 1000);

    // ── Demo mode ──
    const isDemo = new URLSearchParams(window.location.search).has("demo");
    if (isDemo) {
      document.body.classList.add("demo-mode");
      setInterval(() => {
        projectTimeEl.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      }, 60_000);
    }

    // Activity ticker (demo mode)
    const activityLog = [];
    if (isDemo) {
      const ticker = document.createElement("div");
      ticker.id = "activity-ticker";
      ticker.className = "activity-ticker";
      ticker.innerHTML = '<div class="ticker-header">Activity</div>';
      document.body.appendChild(ticker);
    }

    function renderActivityTicker() {
      const ticker = document.getElementById("activity-ticker");
      if (!ticker) return;
      const headerHtml = '<div class="ticker-header">Activity</div>';
      const itemsHtml = activityLog.slice(0, 30).map(a => {
        const time = new Date(a.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        const agentStr = a.agent ? `<span class="ticker-agent">${esc(a.agent)}</span> ` : "";
        return `<div class="ticker-item ticker-${a.type}">${agentStr}<span class="ticker-desc">${esc(a.description)}</span> <span class="ticker-title">${esc(a.title)}</span> <span class="ticker-time">${time}</span></div>`;
      }).join("");
      ticker.innerHTML = headerHtml + itemsHtml;
    }

    // ── Multi-project state ──
    const projectsData = new Map();   // projectPath -> { issues, status, config }
    let projectsList = [];             // [{id, name, status, path}, ...] from server
    let activeProjectId = null;

    // Track which columns have been manually expanded (pinned open), per project
    const pinnedColumnsPerProject = new Map();
    function getPinnedColumns() {
      if (!activeProjectId) return new Set();
      if (!pinnedColumnsPerProject.has(activeProjectId)) {
        pinnedColumnsPerProject.set(activeProjectId, new Set());
      }
      return pinnedColumnsPerProject.get(activeProjectId);
    }
    // Alias for existing code compatibility
    let pinnedColumns = new Set();

    // Focus mode
    let focusMode = false;
    focusBtnEl.addEventListener("click", () => {
      focusMode = !focusMode;
      document.body.classList.toggle("focus-active", focusMode);
      focusBtnEl.classList.toggle("active", focusMode);
    });

    const STATUS_ICON = {
      open: "○",
      in_progress: "◐",
      closed: "✓",
      cancelled: "✕",
    };

    // ── Sidebar ──
    let sidebarOpen = false;

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      sidebarEl.classList.toggle("open", sidebarOpen);
      sidebarOverlayEl.classList.toggle("visible", sidebarOpen);
      document.body.classList.toggle("sidebar-open", sidebarOpen);
    }

    function closeSidebar() {
      sidebarOpen = false;
      sidebarEl.classList.remove("open");
      sidebarOverlayEl.classList.remove("visible");
      document.body.classList.remove("sidebar-open");
    }

    const allClearProjectsEl = document.getElementById("all-clear-projects");

    projectCardEl.addEventListener("click", toggleSidebar);
    allClearProjectsEl.addEventListener("click", toggleSidebar);
    sidebarOverlayEl.addEventListener("click", closeSidebar);

    function renderSidebar() {
      if (projectsList.length === 0) {
        sidebarListEl.innerHTML = '<div class="sidebar-empty">No projects registered.<br>Run <code>web-ait --client</code> from a project directory.</div>';
        return;
      }
      sidebarListEl.innerHTML = "";
      for (const p of projectsList) {
        const item = document.createElement("div");
        item.className = "sidebar-item" + (p.id === activeProjectId ? " active" : "");

        const dot = document.createElement("span");
        dot.className = "sidebar-dot sidebar-dot-" + (p.status || "empty");

        const name = document.createElement("span");
        name.className = "sidebar-name";
        name.textContent = p.name;

        const remove = document.createElement("button");
        remove.className = "sidebar-remove";
        remove.textContent = "✕";
        remove.title = "Remove project";
        remove.addEventListener("click", async (e) => {
          e.stopPropagation();
          await fetch(`/api/projects?path=${encodeURIComponent(p.id)}`, { method: "DELETE" });
        });

        item.appendChild(dot);
        item.appendChild(name);
        item.appendChild(remove);
        item.addEventListener("click", () => {
          switchToProject(p.id);
          closeSidebar();
        });
        sidebarListEl.appendChild(item);
      }
    }

    function switchToProject(projectId) {
      if (activeProjectId === projectId) return;
      // Save current pinned columns
      if (activeProjectId) {
        pinnedColumnsPerProject.set(activeProjectId, new Set(pinnedColumns));
      }
      activeProjectId = projectId;
      pinnedColumns = getPinnedColumns();
      // Clear board for clean re-render
      boardEl.innerHTML = "";
      const data = projectsData.get(projectId);
      if (data) render(data);
      renderSidebar();
    }

    // ── SSE with auto-reconnect ──
    let reconnectDelay = 1000;

    function connect() {
      const source = new EventSource("/events");

      source.onopen = () => {
        reconnectDelay = 1000;
        statusDot.classList.remove("disconnected");
        reconnectEl.classList.remove("visible");
      };

      source.addEventListener("projects", (e) => {
        projectsList = JSON.parse(e.data);
        document.body.classList.toggle("has-multiple-projects", projectsList.length > 1);
        // Auto-select first project if none active
        if (!activeProjectId && projectsList.length > 0) {
          activeProjectId = projectsList[0].id;
          pinnedColumns = getPinnedColumns();
        }
        renderSidebar();
      });

      source.addEventListener("update", (e) => {
        const msg = JSON.parse(e.data);
        projectsData.set(msg.projectId, {
          issues: msg.issues,
          status: msg.status,
          config: msg.config,
        });
        // Render if this is the active project
        if (msg.projectId === activeProjectId) {
          render(projectsData.get(activeProjectId));

          // Demo mode: flash changed tasks
          if (isDemo && msg.changedTaskIds) {
            for (const taskId of msg.changedTaskIds) {
              const el = document.querySelector(`[data-task-id="${taskId}"]`);
              if (el) {
                el.classList.add("demo-flash");
                setTimeout(() => el.classList.remove("demo-flash"), 1500);
              }
            }
          }
          // Demo mode: flash completed epic headers
          if (isDemo && msg.completedEpicIds) {
            for (const epicId of msg.completedEpicIds) {
              const col = document.querySelector(`[data-id="${epicId}"]`);
              if (col) {
                const header = col.querySelector(".column-header, .group-header");
                if (header) {
                  header.classList.add("demo-epic-complete-flash");
                  setTimeout(() => header.classList.remove("demo-epic-complete-flash"), 2000);
                }
              }
            }
          }
        }
        // Update sidebar status indicators
        const proj = projectsList.find(p => p.id === msg.projectId);
        if (proj) {
          const data = projectsData.get(msg.projectId);
          const issues = data?.issues?.issues || [];
          const tasks = issues.filter(i => i.type === "task");
          if (tasks.length === 0) proj.status = "empty";
          else if (tasks.every(t => t.status === "closed" || t.status === "cancelled")) proj.status = "done";
          else if (tasks.some(t => t.status === "in_progress")) proj.status = "active";
          else proj.status = "idle";
          renderSidebar();
        }
      });

      // Demo mode: activity ticker events
      source.addEventListener("activity", (e) => {
        const msg = JSON.parse(e.data);
        if (msg.projectId === activeProjectId) {
          activityLog.unshift(msg);
          if (activityLog.length > 50) activityLog.pop();
          renderActivityTicker();
        }
      });

      source.addEventListener("removed", (e) => {
        const msg = JSON.parse(e.data);
        projectsData.delete(msg.projectId);
        pinnedColumnsPerProject.delete(msg.projectId);
        // If we were viewing this project, switch to another
        if (activeProjectId === msg.projectId) {
          activeProjectId = projectsList.length > 0 ? projectsList[0].id : null;
          pinnedColumns = getPinnedColumns();
          boardEl.innerHTML = "";
          if (activeProjectId) {
            const data = projectsData.get(activeProjectId);
            if (data) render(data);
          }
        }
      });

      source.onerror = () => {
        source.close();
        statusDot.classList.add("disconnected");
        reconnectEl.classList.add("visible");
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      };
    }

    // ── Render with in-place DOM updates for smooth transitions ──
    function render(data) {
      const config = data.config || {};
      const counts = data.status?.counts || {};
      const issues = data.issues?.issues || [];

      // Track start time for elapsed timer
      const startTime = getProjectStartTime(issues);
      if (startTime) projectStartTimes.set(activeProjectId, startTime);
      updateElapsedTimer();

      // Project card
      const prefix = config.prefix || "—";
      const basename = prefix.split("/").pop().replace(/[-_]/g, " ");
      projectNameEl.textContent = basename;
      projectTimeEl.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      // ── Summary stat cards ──
      const allTasks = issues.filter(i => i.type === "task");
      const totalTasks = allTasks.length;
      const doneTasks = allTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      const wipTasks = allTasks.filter(t => t.status === "in_progress").length;
      const openTasks = totalTasks - doneTasks - wipTasks;
      const readyCount = counts.ready ?? 0;
      const p0Urgent = allTasks.filter(t => t.priority === "P0" && (t.status === "open" || t.status === "in_progress")).length;

      function statCard(num, label, cls, extra) {
        return `<div class="summary-stat ${cls}${extra || ''}">`
          + `<span class="summary-stat-number">${num}</span>`
          + `<span class="summary-stat-label">${label}</span></div>`;
      }

      if (focusMode) {
        const remaining = totalTasks - doneTasks;
        summaryStatsEl.innerHTML = statCard(remaining, "remaining", "summary-stat-progress");
      } else {
        summaryStatsEl.innerHTML =
          statCard(openTasks, "open", "summary-stat-open") +
          statCard(wipTasks, "in progress", "summary-stat-progress") +
          statCard(p0Urgent, "P0", "summary-stat-p0", p0Urgent > 0 ? " has-p0" : "") +
          statCard(doneTasks, "done", "summary-stat-done") +
          statCard(readyCount, "ready", "summary-stat-ready");
      }

      // Stacked progress bar
      const pctDone = totalTasks ? (doneTasks / totalTasks * 100) : 0;
      const pctWip = totalTasks ? (wipTasks / totalTasks * 100) : 0;
      const pctOpen = totalTasks ? (openTasks / totalTasks * 100) : 0;
      summaryProgressEl.innerHTML =
        `<div class="summary-progress-seg summary-progress-done" style="width:${pctDone}%"></div>` +
        `<div class="summary-progress-seg summary-progress-wip" style="width:${pctWip}%"></div>` +
        `<div class="summary-progress-seg summary-progress-open" style="width:${pctOpen}%"></div>`;

      // Group — build a tree that supports arbitrary nesting
      const issueMap = new Map();
      for (const i of issues) issueMap.set(i.id, i);

      // Map each parent to its direct children
      const childrenOf = new Map();
      for (const i of issues) {
        if (i.parent_id) {
          if (!childrenOf.has(i.parent_id)) childrenOf.set(i.parent_id, []);
          childrenOf.get(i.parent_id).push(i);
        }
      }

      const sortFn = (a, b) =>
        (a.priority || "P4").localeCompare(b.priority || "P4") ||
        a.created_at.localeCompare(b.created_at);

      // Flatten a subtree into an ordered list with depth/grouping metadata
      function flattenChildren(parentId, depth) {
        const kids = childrenOf.get(parentId) || [];
        kids.sort(sortFn);
        const result = [];
        for (const kid of kids) {
          const descendants = flattenChildren(kid.id, depth + 1);
          kid._depth = depth;
          kid._hasChildren = descendants.length > 0;
          if (kid._hasChildren) {
            kid._childCount = descendants.length;
            kid._doneCount = descendants.filter(t => t.status === "closed" || t.status === "cancelled").length;
          }
          result.push(kid);
          result.push(...descendants);
        }
        return result;
      }

      // Walk up parent chain to find root epic
      function findRootEpic(issue) {
        let current = issue;
        const visited = new Set();
        while (current.parent_id && !visited.has(current.parent_id)) {
          visited.add(current.parent_id);
          const parent = issueMap.get(current.parent_id);
          if (!parent) return null;
          if (parent.type === "epic") return parent;
          current = parent;
        }
        return null;
      }

      const initiatives = issues.filter(i => i.type === "initiative");
      initiatives.sort(sortFn);

      const epics = issues.filter(i => i.type === "epic");
      epics.sort(sortFn);

      // Find orphan tasks (no epic ancestor)
      const standalone = [];
      for (const i of issues) {
        if (i.type === "task" && !findRootEpic(i)) {
          i._depth = 0;
          i._hasChildren = false;
          standalone.push(i);
        }
      }
      standalone.sort(sortFn);

      // Helper: build a column entry for an epic
      function buildEpicEntry(epic) {
        const directKids = (childrenOf.get(epic.id) || []).slice().sort(sortFn);
        const hasSubGroups = directKids.some(k => (childrenOf.get(k.id) || []).length > 0);

        if (hasSubGroups) {
          const subColumns = [];
          const leafTasks = [];

          for (const kid of directKids) {
            const grandchildren = flattenChildren(kid.id, 0);
            if (grandchildren.length > 0) {
              subColumns.push({ issue: kid, children: grandchildren });
            } else {
              kid._depth = 0;
              kid._hasChildren = false;
              leafTasks.push(kid);
            }
          }

          if (leafTasks.length) {
            subColumns.unshift({
              issue: { title: "General", status: "open", priority: null, id: epic.id + "_general" },
              children: leafTasks,
            });
          }

          const allTasks = subColumns.flatMap(sc => sc.children);
          const allDone = allTasks.length > 0 && allTasks.every(t => t.status === "closed" || t.status === "cancelled");
          const isCompleted = epic.status === "closed" || epic.status === "cancelled" || allDone;

          return { epic, subColumns, grouped: true, completed: isCompleted };
        } else {
          const children = flattenChildren(epic.id, 0);
          const allDone = children.length > 0 && children.every(t => t.status === "closed" || t.status === "cancelled");
          const isCompleted = epic.status === "closed" || epic.status === "cancelled" || allDone;
          return { epic, children, grouped: false, completed: isCompleted };
        }
      }

      // Track which epics belong to an initiative
      const initiativeEpicIds = new Set();
      const initiativeSections = [];

      for (const init of initiatives) {
        const initEpics = epics.filter(e => e.parent_id === init.id);
        for (const e of initEpics) initiativeEpicIds.add(e.id);
        const entries = initEpics.map(buildEpicEntry);
        const activeEntries = entries.filter(e => !e.completed);
        const completedEntries = entries.filter(e => e.completed);
        initiativeSections.push({
          initiative: init,
          columns: [...activeEntries, ...completedEntries],
        });
      }

      // Build column data for epics NOT under an initiative
      const activeColumns = [];
      const completedColumns = [];

      for (const epic of epics) {
        if (initiativeEpicIds.has(epic.id)) continue;
        const entry = buildEpicEntry(epic);
        if (entry.completed) completedColumns.push(entry);
        else activeColumns.push(entry);
      }

      if (standalone.length) {
        activeColumns.push({
          epic: { title: "Standalone", status: "open", priority: null, id: "_standalone" },
          children: standalone,
          grouped: false,
          completed: false,
        });
      }

      // Active first, then completed (sorted to the right)
      const columns = [...activeColumns, ...completedColumns];

      // All-clear state: no active columns and no standalone tasks
      const hasActiveInitiativeWork = initiativeSections.some(s => s.columns.some(e => !e.completed));
      const allClear = activeColumns.length === 0 && standalone.length === 0 && !hasActiveInitiativeWork && (epics.length > 0 || initiatives.length > 0);
      if (allClear) {
        boardEl.style.display = "none";
        summaryBarEl.style.display = "none";
        allClearEl.classList.add("visible");
        const total = issues.length;
        const closed = issues.filter(i => i.status === "closed").length;
        const cancelled = issues.filter(i => i.status === "cancelled").length;
        allClearCountsEl.textContent = `${closed} closed · ${cancelled} cancelled · ${total} total`;
        // Show total elapsed on all-clear
        const endTime = getProjectEndTime(issues);
        if (startTime && endTime) {
          allClearElapsedEl.textContent = `completed in ${formatElapsed(endTime.getTime() - startTime.getTime())}`;
        } else {
          allClearElapsedEl.textContent = "";
        }
        elapsedTimerEl.classList.remove("visible");
        return;
      } else {
        boardEl.style.display = "";
        summaryBarEl.style.display = "";
        allClearEl.classList.remove("visible");
      }

      // Reconcile board children (columns, groups, and initiative sections)
      const existingEls = boardEl.querySelectorAll(":scope > .column, :scope > .column-group, :scope > .initiative-section");
      const existingById = new Map();
      for (const el of existingEls) {
        existingById.set(el.dataset.id, el);
      }

      // Build the full ordered list of top-level board items
      const allBoardItems = [];

      // Initiative sections first
      for (const section of initiativeSections) {
        allBoardItems.push({ type: "initiative", id: section.initiative.id, section });
      }

      // Then loose columns
      for (const entry of columns) {
        allBoardItems.push({ type: entry.grouped ? "group" : "column", id: entry.epic.id, entry });
      }

      const newIds = new Set(allBoardItems.map(item => item.id));

      // Remove elements that no longer exist
      for (const el of existingEls) {
        if (!newIds.has(el.dataset.id)) el.remove();
      }

      // Update or create
      let prevEl = null;
      for (const item of allBoardItems) {
        let el = existingById.get(item.id);

        if (item.type === "initiative") {
          const { initiative, columns: initColumns } = item.section;
          if (el && el.classList.contains("initiative-section")) {
            updateInitiativeSection(el, initiative, initColumns);
          } else {
            if (el) el.remove();
            el = createInitiativeSection(initiative, initColumns);
            boardEl.appendChild(el);
          }
        } else if (item.type === "group") {
          const { epic, subColumns, completed } = item.entry;
          if (el && el.classList.contains("column-group")) {
            updateGroup(el, epic, subColumns);
          } else {
            if (el) el.remove();
            el = createGroup(epic, subColumns);
            boardEl.appendChild(el);
          }
          if (completed && !pinnedColumns.has(epic.id)) el.classList.add("collapsed");
          else el.classList.remove("collapsed");
        } else {
          const { epic, children, completed } = item.entry;
          if (el && !el.classList.contains("column-group") && !el.classList.contains("initiative-section")) {
            updateColumn(el, epic, children);
          } else {
            if (el) el.remove();
            el = createColumn(epic, children);
            boardEl.appendChild(el);
          }
          if (completed && !pinnedColumns.has(epic.id)) el.classList.add("collapsed");
          else el.classList.remove("collapsed");
        }

        // Ensure order
        if (prevEl && prevEl.nextElementSibling !== el) {
          prevEl.after(el);
        }
        prevEl = el;
      }
    }

    // ── Helpers for mini progress bars and header tinting ──
    function buildMiniProgress(tasks) {
      const total = tasks.length;
      if (!total) return null;
      const done = tasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      const wip = tasks.filter(t => t.status === "in_progress").length;
      const open = total - done - wip;

      const bar = document.createElement("span");
      bar.className = "mini-progress";
      bar.innerHTML =
        `<span class="mini-progress-seg mini-progress-done" style="width:${done/total*100}%"></span>` +
        `<span class="mini-progress-seg mini-progress-wip" style="width:${wip/total*100}%"></span>` +
        `<span class="mini-progress-seg mini-progress-open" style="width:${open/total*100}%"></span>`;
      return bar;
    }

    function headerTint(tasks) {
      const total = tasks.length;
      if (!total) return "";
      const done = tasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      const hasP0 = tasks.some(t => t.priority === "P0" && (t.status === "open" || t.status === "in_progress"));
      const hasWip = tasks.some(t => t.status === "in_progress");
      if (done === total) return "rgba(76,174,106,0.08)";
      if (hasP0) return "rgba(224,85,85,0.08)";
      if (hasWip) return "rgba(91,138,240,0.08)";
      return "";
    }

    function createColumn(epic, children) {
      const col = document.createElement("div");
      col.className = "column";
      col.dataset.id = epic.id;

      // Click to toggle pin on collapsed columns
      col.addEventListener("click", () => {
        if (col.classList.contains("collapsed")) {
          pinnedColumns.add(epic.id);
          col.classList.remove("collapsed");
        } else if (pinnedColumns.has(epic.id)) {
          pinnedColumns.delete(epic.id);
          col.classList.add("collapsed");
        }
      });

      const header = document.createElement("div");
      header.className = "column-header" + (epic.status === "closed" ? " column-header-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `column-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const titleSpan = document.createElement("span");
      titleSpan.className = "column-title";
      titleSpan.title = epic.title || "";
      titleSpan.textContent = epic.title || "";

      header.appendChild(statusSpan);
      header.appendChild(titleSpan);

      if (epic.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `column-priority pr-${epic.priority}`;
        prSpan.textContent = epic.priority;
        header.appendChild(prSpan);
      }

      const countSpan = document.createElement("span");
      countSpan.className = "column-count";
      const doneCount = children.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${children.length}`;
      header.appendChild(countSpan);

      const miniBar = buildMiniProgress(children);
      if (miniBar) header.appendChild(miniBar);

      const tint = headerTint(children);
      if (tint) header.style.background = tint;

      col.appendChild(header);

      const tasksDiv = document.createElement("div");
      tasksDiv.className = "column-tasks";
      for (const t of children) {
        appendTask(tasksDiv, t);
      }
      if (!children.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no tasks";
        tasksDiv.appendChild(empty);
      }
      col.appendChild(tasksDiv);

      return col;
    }

    function updateColumn(col, epic, children) {
      // Update header
      const header = col.querySelector(".column-header");
      header.className = "column-header" + (epic.status === "closed" ? " column-header-closed" : "");

      const statusSpan = header.querySelector(".column-status");
      statusSpan.className = `column-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const countSpan = header.querySelector(".column-count");
      const doneCount = children.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${children.length}`;

      // Update mini progress bar
      const oldMini = header.querySelector(".mini-progress");
      const newMini = buildMiniProgress(children);
      if (oldMini && newMini) oldMini.replaceWith(newMini);
      else if (newMini) header.appendChild(newMini);
      else if (oldMini) oldMini.remove();

      // Update header tint
      const tint = headerTint(children);
      header.style.background = tint || "";

      // Reconcile tasks
      const tasksDiv = col.querySelector(".column-tasks");
      const existingTasks = tasksDiv.querySelectorAll("[data-task-id]");
      const existingById = new Map();
      for (const el of existingTasks) {
        existingById.set(el.dataset.taskId, el);
      }

      // Remove empty placeholder if present
      const emptyEl = tasksDiv.querySelector(".empty");
      if (emptyEl && children.length) emptyEl.remove();

      const newIds = new Set(children.map(t => t.id));

      // Remove tasks no longer present (and their claimed spans)
      for (const el of existingTasks) {
        if (!newIds.has(el.dataset.taskId)) {
          // Remove following claimed span if present
          const next = el.nextElementSibling;
          if (next && next.classList.contains("task-claimed")) next.remove();
          el.remove();
        }
      }

      // Update or create tasks in order
      let prevEl = null;
      for (const t of children) {
        let taskEl = existingById.get(t.id);
        if (taskEl) {
          updateTask(taskEl, t);
        } else {
          taskEl = createTaskEl(t);
          tasksDiv.appendChild(taskEl);
        }
        // Ensure order
        if (prevEl) {
          // prevEl might be followed by a claimed span — skip past it
          let insertAfter = prevEl;
          if (insertAfter.nextElementSibling?.classList.contains("task-claimed")) {
            insertAfter = insertAfter.nextElementSibling;
          }
          if (insertAfter.nextElementSibling !== taskEl) {
            insertAfter.after(taskEl);
          }
        }
        prevEl = taskEl;
        // Move claimed span right after if present
        const claimedSpan = tasksDiv.querySelector(`[data-claimed-for="${t.id}"]`);
        if (claimedSpan && claimedSpan.previousElementSibling !== taskEl) {
          taskEl.after(claimedSpan);
        }
      }

      // Add empty placeholder if no children
      if (!children.length && !tasksDiv.querySelector(".empty")) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no tasks";
        tasksDiv.appendChild(empty);
      }
    }

    function createGroup(epic, subColumns) {
      const group = document.createElement("div");
      group.className = "column-group";
      group.dataset.id = epic.id;
      group.style.flex = `${subColumns.length} 1 0`;
      group.style.minWidth = `${subColumns.length * 180}px`;

      // Click to toggle pin (same pattern as columns)
      group.addEventListener("click", () => {
        if (group.classList.contains("collapsed")) {
          pinnedColumns.add(epic.id);
          group.classList.remove("collapsed");
        } else if (pinnedColumns.has(epic.id)) {
          pinnedColumns.delete(epic.id);
          group.classList.add("collapsed");
        }
      });

      const header = document.createElement("div");
      header.className = "group-header" + (epic.status === "closed" ? " group-header-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `group-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";
      header.appendChild(statusSpan);

      const titleSpan = document.createElement("span");
      titleSpan.className = "group-title";
      titleSpan.title = epic.title || "";
      titleSpan.textContent = epic.title || "";
      header.appendChild(titleSpan);

      if (epic.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `group-priority pr-${epic.priority}`;
        prSpan.textContent = epic.priority;
        header.appendChild(prSpan);
      }

      const countSpan = document.createElement("span");
      countSpan.className = "group-count";
      const allGroupTasks = subColumns.flatMap(sc => sc.children);
      const doneCount = allGroupTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${allGroupTasks.length}`;
      header.appendChild(countSpan);

      const miniBar = buildMiniProgress(allGroupTasks);
      if (miniBar) header.appendChild(miniBar);

      const tint = headerTint(allGroupTasks);
      if (tint) header.style.background = tint;

      group.appendChild(header);

      const columnsDiv = document.createElement("div");
      columnsDiv.className = "group-columns";

      for (const { issue, children } of subColumns) {
        const col = createColumn(issue, children);
        columnsDiv.appendChild(col);
      }

      group.appendChild(columnsDiv);
      return group;
    }

    function updateGroup(group, epic, subColumns) {
      group.style.flex = `${subColumns.length} 1 0`;
      group.style.minWidth = `${subColumns.length * 180}px`;

      // Update header
      const header = group.querySelector(":scope > .group-header");
      header.className = "group-header" + (epic.status === "closed" ? " group-header-closed" : "");

      const statusSpan = header.querySelector(".group-status");
      statusSpan.className = `group-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const countSpan = header.querySelector(".group-count");
      const allGroupTasks = subColumns.flatMap(sc => sc.children);
      const doneCount = allGroupTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${allGroupTasks.length}`;

      // Update mini progress bar
      const oldMini = header.querySelector(".mini-progress");
      const newMini = buildMiniProgress(allGroupTasks);
      if (oldMini && newMini) oldMini.replaceWith(newMini);
      else if (newMini) header.appendChild(newMini);
      else if (oldMini) oldMini.remove();

      // Update header tint
      const tint = headerTint(allGroupTasks);
      header.style.background = tint || "";

      // Reconcile sub-columns
      const columnsDiv = group.querySelector(":scope > .group-columns");
      const existingCols = columnsDiv.querySelectorAll(":scope > .column");
      const existingById = new Map();
      for (const col of existingCols) {
        existingById.set(col.dataset.id, col);
      }

      const newIds = new Set(subColumns.map(sc => sc.issue.id));

      for (const col of existingCols) {
        if (!newIds.has(col.dataset.id)) col.remove();
      }

      let prevCol = null;
      for (const { issue, children } of subColumns) {
        let col = existingById.get(issue.id);
        if (col) {
          updateColumn(col, issue, children);
        } else {
          col = createColumn(issue, children);
          columnsDiv.appendChild(col);
        }
        if (prevCol && prevCol.nextElementSibling !== col) {
          prevCol.after(col);
        }
        prevCol = col;
      }
    }

    function createInitiativeBanner(initiative, epicEntries) {
      const banner = document.createElement("div");
      const isClosed = initiative.status === "closed" || initiative.status === "cancelled";
      banner.className = "initiative-banner" + (isClosed ? " initiative-banner-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `initiative-status s-${initiative.status}`;
      statusSpan.textContent = STATUS_ICON[initiative.status] || "○";
      banner.appendChild(statusSpan);

      const label = document.createElement("span");
      label.className = "initiative-label";
      label.textContent = "initiative";
      banner.appendChild(label);

      const titleSpan = document.createElement("span");
      titleSpan.className = "initiative-title";
      titleSpan.title = initiative.title || "";
      titleSpan.textContent = initiative.title || "";
      banner.appendChild(titleSpan);

      if (initiative.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `initiative-priority pr-${initiative.priority}`;
        prSpan.textContent = initiative.priority;
        banner.appendChild(prSpan);
      }

      // Gather all descendant tasks for a count
      const allTasks = epicEntries.flatMap(e =>
        e.grouped ? e.subColumns.flatMap(sc => sc.children) : (e.children || [])
      );
      const doneCount = allTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      if (allTasks.length > 0) {
        const countSpan = document.createElement("span");
        countSpan.className = "initiative-count";
        countSpan.textContent = `${doneCount}/${allTasks.length}`;
        banner.appendChild(countSpan);

        const miniBar = buildMiniProgress(allTasks);
        if (miniBar) banner.appendChild(miniBar);
      }

      return banner;
    }

    function createInitiativeSection(initiative, epicEntries) {
      const section = document.createElement("div");
      section.className = "initiative-section";
      section.dataset.id = initiative.id;
      section.style.flex = `${Math.max(epicEntries.length, 1)} 1 0`;

      const banner = createInitiativeBanner(initiative, epicEntries);
      section.appendChild(banner);

      const columnsDiv = document.createElement("div");
      columnsDiv.className = "initiative-columns";

      for (const entry of epicEntries) {
        let el;
        if (entry.grouped) {
          el = createGroup(entry.epic, entry.subColumns);
        } else {
          el = createColumn(entry.epic, entry.children);
        }
        if (entry.completed && !pinnedColumns.has(entry.epic.id)) {
          el.classList.add("collapsed");
        }
        columnsDiv.appendChild(el);
      }

      section.appendChild(columnsDiv);
      return section;
    }

    function updateInitiativeSection(section, initiative, epicEntries) {
      section.style.flex = `${Math.max(epicEntries.length, 1)} 1 0`;

      // Update banner
      const oldBanner = section.querySelector(":scope > .initiative-banner");
      const newBanner = createInitiativeBanner(initiative, epicEntries);
      if (oldBanner) oldBanner.replaceWith(newBanner);
      else section.prepend(newBanner);

      // Reconcile epic columns within the section
      const columnsDiv = section.querySelector(":scope > .initiative-columns");
      const existingCols = columnsDiv.querySelectorAll(":scope > .column, :scope > .column-group");
      const existingById = new Map();
      for (const col of existingCols) {
        existingById.set(col.dataset.id, col);
      }

      const newIds = new Set(epicEntries.map(e => e.epic.id));
      for (const col of existingCols) {
        if (!newIds.has(col.dataset.id)) col.remove();
      }

      let prevCol = null;
      for (const entry of epicEntries) {
        let el = existingById.get(entry.epic.id);
        if (entry.grouped) {
          if (el && el.classList.contains("column-group")) {
            updateGroup(el, entry.epic, entry.subColumns);
          } else {
            if (el) el.remove();
            el = createGroup(entry.epic, entry.subColumns);
            columnsDiv.appendChild(el);
          }
        } else {
          if (el && !el.classList.contains("column-group")) {
            updateColumn(el, entry.epic, entry.children);
          } else {
            if (el) el.remove();
            el = createColumn(entry.epic, entry.children);
            columnsDiv.appendChild(el);
          }
        }
        if (entry.completed && !pinnedColumns.has(entry.epic.id)) el.classList.add("collapsed");
        else el.classList.remove("collapsed");

        if (prevCol && prevCol.nextElementSibling !== el) {
          prevCol.after(el);
        }
        prevCol = el;
      }
    }

    function createTaskEl(t) {
      const wrapper = document.createDocumentFragment();

      const div = document.createElement("div");
      div.dataset.taskId = t.id;
      const dimClass = t.status === "closed" ? " task-closed" : t.status === "cancelled" ? " task-cancelled" : "";
      const groupClass = t._hasChildren ? " task-group" : "";
      const attentionClass = (t.priority === "P0" && (t.status === "open" || t.status === "in_progress")) ? " task-attention" : "";
      div.className = "task" + dimClass + groupClass + attentionClass;

      // Indent based on nesting depth
      const depth = t._depth || 0;
      div.style.paddingLeft = `${0.75 + depth * 1}rem`;

      const statusSpan = document.createElement("span");
      statusSpan.className = `task-status s-${t.status}`;
      statusSpan.textContent = STATUS_ICON[t.status] || "○";
      div.appendChild(statusSpan);

      const titleSpan = document.createElement("span");
      titleSpan.className = "task-title";
      titleSpan.title = t.title || "";
      titleSpan.textContent = t.title || "";
      div.appendChild(titleSpan);

      if (t.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `task-priority pr-${t.priority}`;
        prSpan.textContent = t.priority;
        div.appendChild(prSpan);
      }

      // Show progress count for group tasks (e.g. phase tasks)
      if (t._hasChildren) {
        const countSpan = document.createElement("span");
        countSpan.className = "task-group-count";
        countSpan.textContent = `${t._doneCount}/${t._childCount}`;
        div.appendChild(countSpan);
      }

      wrapper.appendChild(div);

      if (t.claimed_by) {
        const claimed = document.createElement("span");
        claimed.className = "task-claimed";
        claimed.dataset.claimedFor = t.id;
        claimed.textContent = `↳ ${t.claimed_by}`;
        wrapper.appendChild(claimed);
      }

      return div;
    }

    function appendTask(container, t) {
      const el = createTaskEl(t);
      container.appendChild(el);
      // Claimed span is in the fragment, already appended
      if (t.claimed_by) {
        const depth = t._depth || 0;
        const claimed = document.createElement("span");
        claimed.className = "task-claimed";
        claimed.dataset.claimedFor = t.id;
        claimed.textContent = `↳ ${t.claimed_by}`;
        claimed.style.paddingLeft = `${1.85 + depth * 1}rem`;
        container.appendChild(claimed);
      }
    }

    function updateTask(el, t) {
      const dimClass = t.status === "closed" ? " task-closed" : t.status === "cancelled" ? " task-cancelled" : "";
      const groupClass = t._hasChildren ? " task-group" : "";
      const attentionClass = (t.priority === "P0" && (t.status === "open" || t.status === "in_progress")) ? " task-attention" : "";
      el.className = "task" + dimClass + groupClass + attentionClass;

      // Update indentation
      const depth = t._depth || 0;
      el.style.paddingLeft = `${0.75 + depth * 1}rem`;

      const statusSpan = el.querySelector(".task-status");
      statusSpan.className = `task-status s-${t.status}`;
      statusSpan.textContent = STATUS_ICON[t.status] || "○";

      // Update group count badge
      let groupCount = el.querySelector(".task-group-count");
      if (t._hasChildren) {
        if (!groupCount) {
          groupCount = document.createElement("span");
          groupCount.className = "task-group-count";
          el.appendChild(groupCount);
        }
        groupCount.textContent = `${t._doneCount}/${t._childCount}`;
      } else if (groupCount) {
        groupCount.remove();
      }

      // Update claimed span
      const parent = el.parentElement;
      let claimedEl = parent.querySelector(`[data-claimed-for="${t.id}"]`);
      if (t.claimed_by) {
        if (!claimedEl) {
          claimedEl = document.createElement("span");
          claimedEl.className = "task-claimed";
          claimedEl.dataset.claimedFor = t.id;
          el.after(claimedEl);
        }
        claimedEl.textContent = `↳ ${t.claimed_by}`;
        claimedEl.style.paddingLeft = `${1.85 + depth * 1}rem`;
      } else if (claimedEl) {
        claimedEl.remove();
      }
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    connect();
  </script>
</body>
</html>
