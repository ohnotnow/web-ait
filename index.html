      const titleSpan = document.createElement("span");
      titleSpan.className = "group-title";
      titleSpan.title = epic.title || "";
      titleSpan.textContent = epic.title || "";
      header.appendChild(titleSpan);

      if (epic.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `group-priority pr-${epic.priority}`;
        prSpan.textContent = epic.priority;
        header.appendChild(prSpan);
      }

      const countSpan = document.createElement("span");
      countSpan.className = "group-count";
      const allGroupTasks = subColumns.flatMap(sc => sc.children);
      const doneCount = allGroupTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${allGroupTasks.length}`;
      header.appendChild(countSpan);

      const miniBar = buildMiniProgress(allGroupTasks);
      if (miniBar) header.appendChild(miniBar);

      group.appendChild(header);

      const columnsDiv = document.createElement("div");
      columnsDiv.className = "group-columns";

      for (const { issue, children } of subColumns) {
        const col = createColumn(issue, children);
        columnsDiv.appendChild(col);
      }

      group.appendChild(columnsDiv);
      return group;
    }

    function updateGroup(group, epic, subColumns) {
      group.style.flex = `${subColumns.length} 1 0`;
      group.style.minWidth = `${subColumns.length * 200}px`;

      // Update header
      const header = group.querySelector(":scope > .group-header");
      header.className = "group-header" + (epic.status === "closed" ? " group-header-closed" : "");

      const statusSpan = header.querySelector(".group-status");
      statusSpan.className = `group-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const countSpan = header.querySelector(".group-count");
      const allGroupTasks = subColumns.flatMap(sc => sc.children);
      const doneCount = allGroupTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${allGroupTasks.length}`;

      // Update mini progress bar
      const oldMini = header.querySelector(".mini-progress");
      const newMini = buildMiniProgress(allGroupTasks);
      if (oldMini && newMini) oldMini.replaceWith(newMini);
      else if (newMini) header.appendChild(newMini);
      else if (oldMini) oldMini.remove();

      // Reconcile sub-columns
      const columnsDiv = group.querySelector(":scope > .group-columns");
      const existingCols = columnsDiv.querySelectorAll(":scope > .column");
      const existingById = new Map();
      for (const col of existingCols) {
        existingById.set(col.dataset.id, col);
      }

      const newIds = new Set(subColumns.map(sc => sc.issue.id));

      for (const col of existingCols) {
        if (!newIds.has(col.dataset.id)) col.remove();
      }

      let prevCol = null;
      for (const { issue, children } of subColumns) {
        let col = existingById.get(issue.id);
        if (col) {
          updateColumn(col, issue, children);
        } else {
          col = createColumn(issue, children);
          columnsDiv.appendChild(col);
        }
        if (prevCol && prevCol.nextElementSibling !== col) {
          prevCol.after(col);
        }
        prevCol = col;
      }
    }

    function createInitiativeBanner(initiative, epicEntries) {
      const banner = document.createElement("div");
      const isClosed = initiative.status === "closed" || initiative.status === "cancelled";
      banner.className = "initiative-banner" + (isClosed ? " initiative-banner-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `initiative-status s-${initiative.status}`;
      statusSpan.textContent = STATUS_ICON[initiative.status] || "○";
      banner.appendChild(statusSpan);

      const label = document.createElement("span");
      label.className = "initiative-label";
      label.textContent = "initiative";
      banner.appendChild(label);

      const titleSpan = document.createElement("span");
      titleSpan.className = "initiative-title";
      titleSpan.title = initiative.title || "";
      titleSpan.textContent = initiative.title || "";
      banner.appendChild(titleSpan);

      if (initiative.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `initiative-priority pr-${initiative.priority}`;
        prSpan.textContent = initiative.priority;
        banner.appendChild(prSpan);
      }

      // Gather all descendant tasks for a count
      const allTasks = epicEntries.flatMap(e =>
        e.grouped ? e.subColumns.flatMap(sc => sc.children) : (e.children || [])
      );
      const doneCount = allTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      if (allTasks.length > 0) {
        const countSpan = document.createElement("span");
        countSpan.className = "initiative-count";
        countSpan.textContent = `${doneCount}/${allTasks.length}`;
        banner.appendChild(countSpan);

        const miniBar = buildMiniProgress(allTasks);
        if (miniBar) banner.appendChild(miniBar);
      }

      return banner;
    }

    function createInitiativeSection(initiative, epicEntries) {
      const section = document.createElement("div");
      section.className = "initiative-section";
      section.dataset.id = initiative.id;
      section.style.flex = `${Math.max(epicEntries.length, 1)} 1 0`;

      const banner = createInitiativeBanner(initiative, epicEntries);
      section.appendChild(banner);

      const columnsDiv = document.createElement("div");
      columnsDiv.className = "initiative-columns";

      for (const entry of epicEntries) {
        let el;
        if (entry.grouped) {
          el = createGroup(entry.epic, entry.subColumns);
        } else {
          el = createColumn(entry.epic, entry.children);
        }
        if (entry.completed && !pinnedColumns.has(entry.epic.id)) {
          el.classList.add("collapsed");
        }
        columnsDiv.appendChild(el);
      }

      section.appendChild(columnsDiv);
      return section;
    }

    function updateInitiativeSection(section, initiative, epicEntries) {
      section.style.flex = `${Math.max(epicEntries.length, 1)} 1 0`;

      // Update banner
      const oldBanner = section.querySelector(":scope > .initiative-banner");
      const newBanner = createInitiativeBanner(initiative, epicEntries);
      if (oldBanner) oldBanner.replaceWith(newBanner);
      else section.prepend(newBanner);

      // Reconcile epic columns within the section
      const columnsDiv = section.querySelector(":scope > .initiative-columns");
      const existingCols = columnsDiv.querySelectorAll(":scope > .column, :scope > .column-group");
      const existingById = new Map();
      for (const col of existingCols) {
        existingById.set(col.dataset.id, col);
      }

      const newIds = new Set(epicEntries.map(e => e.epic.id));
      for (const col of existingCols) {
        if (!newIds.has(col.dataset.id)) col.remove();
      }

      let prevCol = null;
      for (const entry of epicEntries) {
        let el = existingById.get(entry.epic.id);
        if (entry.grouped) {
          if (el && el.classList.contains("column-group")) {
            updateGroup(el, entry.epic, entry.subColumns);
          } else {
            if (el) el.remove();
            el = createGroup(entry.epic, entry.subColumns);
            columnsDiv.appendChild(el);
          }
        } else {
          if (el && !el.classList.contains("column-group")) {
            updateColumn(el, entry.epic, entry.children);
          } else {
            if (el) el.remove();
            el = createColumn(entry.epic, entry.children);
            columnsDiv.appendChild(el);
          }
        }
        if (entry.completed && !pinnedColumns.has(entry.epic.id)) el.classList.add("collapsed");
        else el.classList.remove("collapsed");

        if (prevCol && prevCol.nextElementSibling !== el) {
          prevCol.after(el);
        }
        prevCol = el;
      }
    }

    function createTaskEl(t) {
      const div = document.createElement("div");
      div.dataset.taskId = t.id;
      const dimClass = t.status === "closed" ? " task-closed" : t.status === "cancelled" ? " task-cancelled" : "";
      const groupClass = t._hasChildren ? " task-group" : "";
      const attentionClass = (t.priority === "P0" && (t.status === "open" || t.status === "in_progress")) ? " task-attention" : "";
      const inProgressClass = t.status === "in_progress" ? " task-in-progress" : "";
      div.className = "task" + dimClass + groupClass + attentionClass + inProgressClass;

      // Indent based on nesting depth
      const depth = t._depth || 0;
      div.style.paddingLeft = `${0.75 + depth * 1}rem`;

      const statusSpan = document.createElement("span");
      statusSpan.className = `task-status s-${t.status}`;
      statusSpan.textContent = STATUS_ICON[t.status] || "○";
      div.appendChild(statusSpan);

      const titleSpan = document.createElement("span");
      titleSpan.className = "task-title";
      titleSpan.title = t.title || "";
      titleSpan.textContent = t.title || "";
      div.appendChild(titleSpan);

      if (t.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `task-priority pr-${t.priority}`;
        prSpan.textContent = t.priority;
        div.appendChild(prSpan);
      }

      // Show progress count for group tasks (e.g. phase tasks)
      if (t._hasChildren) {
        const countSpan = document.createElement("span");
        countSpan.className = "task-group-count";
        countSpan.textContent = `${t._doneCount}/${t._childCount}`;
        div.appendChild(countSpan);
      }

      return div;
    }

    function appendTask(container, t) {
      const el = createTaskEl(t);
      container.appendChild(el);
      if (t.claimed_by) {
        const depth = t._depth || 0;
        const claimed = document.createElement("span");
        claimed.className = "task-claimed";
        claimed.dataset.claimedFor = t.id;
        claimed.textContent = `↳ ${t.claimed_by}`;
        claimed.style.paddingLeft = `${1.85 + depth * 1}rem`;
        container.appendChild(claimed);
      }
    }

    function updateTask(el, t) {
      const dimClass = t.status === "closed" ? " task-closed" : t.status === "cancelled" ? " task-cancelled" : "";
      const groupClass = t._hasChildren ? " task-group" : "";
      const attentionClass = (t.priority === "P0" && (t.status === "open" || t.status === "in_progress")) ? " task-attention" : "";
      const inProgressClass = t.status === "in_progress" ? " task-in-progress" : "";
      el.className = "task" + dimClass + groupClass + attentionClass + inProgressClass;

      // Update indentation
      const depth = t._depth || 0;
      el.style.paddingLeft = `${0.75 + depth * 1}rem`;

      const statusSpan = el.querySelector(".task-status");
      statusSpan.className = `task-status s-${t.status}`;
      statusSpan.textContent = STATUS_ICON[t.status] || "○";

      // Update group count badge
      let groupCount = el.querySelector(".task-group-count");
      if (t._hasChildren) {
        if (!groupCount) {
          groupCount = document.createElement("span");
          groupCount.className = "task-group-count";
          el.appendChild(groupCount);
        }
        groupCount.textContent = `${t._doneCount}/${t._childCount}`;
      } else if (groupCount) {
        groupCount.remove();
      }

      // Update claimed span
      const parent = el.parentElement;
      let claimedEl = parent.querySelector(`[data-claimed-for="${t.id}"]`);
      if (t.claimed_by) {
        if (!claimedEl) {
          claimedEl = document.createElement("span");
          claimedEl.className = "task-claimed";
          claimedEl.dataset.claimedFor = t.id;
          el.after(claimedEl);
        }
        claimedEl.textContent = `↳ ${t.claimed_by}`;
        claimedEl.style.paddingLeft = `${1.85 + depth * 1}rem`;
      } else if (claimedEl) {
        claimedEl.remove();
      }
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s || "";
      return d.innerHTML;
    }

    connect();
  </script>
</body>
</html>
