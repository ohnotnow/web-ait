<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ait-web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Oswald:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── LCARS-inspired "OPS TERMINAL" palette ── */
      --lc-bg:      #07080d;
      --lc-bg-2:    #0e1220;
      --lc-surface: #101527;
      --lc-ink:     #ffe8c2;
      --lc-dim:     #7a7d8a;
      --lc-line:    #1f2338;

      --lc-cyan:    #39e3ff;
      --lc-amber:   #ffb02e;
      --lc-red:     #ff4d6d;
      --lc-green:   #3ee08a;
      --lc-purple:  #c78bff;
      --lc-rust:    #ff7a45;

      --lc-chip-ink: #0a0a12;
      --lc-elbow-radius: 36px;

      /* ── Back-compat aliases (existing JS keeps referring to these class hooks) ── */
      --bg: var(--lc-bg);
      --surface: var(--lc-surface);
      --surface-hover: #151b33;
      --border: var(--lc-line);
      --text: var(--lc-ink);
      --text-muted: var(--lc-dim);
      --text-dim: #4c5165;
      --accent: var(--lc-amber);
      --header-bg: var(--lc-bg-2);

      --status-open:      var(--lc-dim);
      --status-progress:  var(--lc-amber);
      --status-closed:    var(--lc-green);
      --status-cancelled: var(--lc-rust);

      --p0: var(--lc-red);    --p0-bg: rgba(255,77,109,0.14);
      --p1: var(--lc-amber);  --p1-bg: rgba(255,176,46,0.14);
      --p2: var(--lc-cyan);   --p2-bg: rgba(57,227,255,0.14);
      --p3: var(--lc-purple); --p3-bg: rgba(199,139,255,0.14);
      --p4: var(--lc-dim);    --p4-bg: rgba(122,125,138,0.10);
    }

    /* Light mode — cream mission-control cousin of the dark ops terminal */
    @media (prefers-color-scheme: light) {
      :root {
        --lc-bg:      #f4ece0;
        --lc-bg-2:    #ede2cf;
        --lc-surface: #ffffff;
        --lc-ink:     #2a2320;
        --lc-dim:     #7a6c55;
        --lc-line:    #d8c9ae;
        --lc-chip-ink: #1a120a;

        --lc-cyan:    #0a90b8;
        --lc-amber:   #d98824;
        --lc-red:     #c43a55;
        --lc-green:   #2e8b4a;
        --lc-purple:  #8a52c4;
        --lc-rust:    #c65225;

        --surface-hover: #f8f1e2;
        --text-dim: #a59778;

        --p0-bg: rgba(196,58,85,0.10);
        --p1-bg: rgba(217,136,36,0.10);
        --p2-bg: rgba(10,144,184,0.10);
        --p3-bg: rgba(138,82,196,0.10);
        --p4-bg: rgba(122,108,85,0.08);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'JetBrains Mono', ui-monospace, 'Menlo', monospace;
      background: var(--lc-bg);
      color: var(--lc-ink);
      display: flex;
      flex-direction: column;
    }

    /* ── Connection status dot ── */
    .header-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lc-green);
      box-shadow: 0 0 6px var(--lc-green);
      flex-shrink: 0;
    }

    .header-status.disconnected {
      background: var(--lc-red);
      box-shadow: 0 0 6px var(--lc-red);
      animation: lc-blink 1s ease-in-out infinite;
    }

    @keyframes lc-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    /* ══════════════════════════════════════════════
       Top bar — brand elbow + colored stat pills
       ══════════════════════════════════════════════ */
    .summary-bar {
      display: flex;
      flex-direction: column;
      background: var(--lc-bg);
      flex-shrink: 0;
    }

    .summary-top {
      display: flex;
      align-items: stretch;
      gap: 6px;
      padding: 10px 14px;
      flex-wrap: nowrap;
    }

    .summary-stats {
      display: flex;
      gap: 6px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      flex-wrap: nowrap;
    }

    /* Brand elbow (project card) */
    .summary-stat-project {
      position: relative;
      background: var(--lc-amber);
      color: var(--lc-chip-ink);
      border-top-left-radius: var(--lc-elbow-radius);
      border-bottom-left-radius: var(--lc-elbow-radius);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
      padding: 10px 22px 10px 28px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      line-height: 1;
      min-width: 170px;
      max-width: 300px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 0;
      transition: filter 0.15s ease;
    }

    .summary-stat-project:hover { filter: brightness(1.08); }

    .summary-stat-project .summary-stat-number {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1;
      color: var(--lc-chip-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-stat-project .summary-stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 1px;
      color: rgba(10,10,18,0.78);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
    }

    .summary-stat-project .project-agents {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.5px;
      color: rgba(10,10,18,0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary-stat-project .project-agents:empty { display: none; }

    .summary-stat-project .project-chevron {
      display: none;
      font-size: 11px;
      color: rgba(10,10,18,0.55);
      margin-left: 6px;
      transition: transform 0.2s ease;
    }

    .has-multiple-projects .project-chevron { display: inline; }
    .sidebar-open .project-chevron { transform: rotate(180deg); }

    .summary-stat-project .header-status {
      position: absolute;
      top: 8px;
      right: 12px;
    }

    /* Coloured stat pills */
    .summary-stat {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 16px;
      border-radius: 12px;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 800;
      color: var(--lc-chip-ink);
    }

    .summary-stat-number {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }

    .summary-stat-label {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 11px;
      letter-spacing: 1.5px;
      font-weight: 700;
      text-transform: uppercase;
      opacity: 0.85;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .summary-stat-open     { background: var(--lc-cyan); }
    .summary-stat-progress { background: var(--lc-amber); }
    .summary-stat-p0       { background: var(--lc-red); }
    .summary-stat-done     { background: var(--lc-green); }
    .summary-stat-ready    { background: var(--lc-purple); }

    .summary-stat-p0.has-p0 { animation: lc-p0-pulse 2.4s ease-in-out infinite; }
    @keyframes lc-p0-pulse {
      0%, 100% { filter: brightness(1); box-shadow: none; }
      50% { filter: brightness(1.25); box-shadow: 0 0 14px rgba(255,77,109,0.55); }
    }

    /* Focus toggle */
    .focus-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 20px;
      border-radius: 28px;
      border: none;
      background: var(--lc-surface);
      color: var(--lc-ink);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .focus-btn:hover { background: var(--lc-bg-2); }

    .focus-btn.active {
      background: var(--lc-amber);
      color: var(--lc-chip-ink);
    }

    /* Thin progress strip — lives just above the amber ops-bar border on the board */
    .summary-progress {
      display: flex;
      height: 3px;
      background: var(--lc-bg-2);
      margin: 0 14px 6px 14px;
      border-radius: 2px;
      overflow: hidden;
    }

    .summary-progress-seg { height: 100%; transition: width 0.6s ease; }
    .summary-progress-done { background: var(--lc-green); }
    .summary-progress-wip  { background: var(--lc-amber); }
    .summary-progress-open { background: var(--lc-dim); opacity: 0.4; }

    /* ══════════════════════════════════════════════
       Board + columns
       ══════════════════════════════════════════════ */
    .board-wrap {
      flex: 1;
      display: flex;
      flex-direction: row;
      min-height: 0;
      border-top: 2px solid var(--lc-amber);
      background: var(--lc-bg);
    }

    .board {
      flex: 1;
      display: flex;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      min-height: 0;
      min-width: 0;
      background: var(--lc-bg);
    }

    /* ══════════════════════════════════════════════
       Archive rail — completed epics as vertical tabs
       (hidden when empty; opens one epic at a time)
       ══════════════════════════════════════════════ */
    .archive-rail {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 6px;
      flex-shrink: 0;
      width: 50px;
      background: var(--lc-bg);
      border-left: 2px solid var(--lc-line);
      overflow-y: auto;
      overflow-x: hidden;
    }

    .archive-rail:empty { display: none; }

    .archive-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 10px 4px;
      background: var(--lc-surface);
      color: var(--lc-dim);
      border: 1px solid var(--lc-line);
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
      /* Fixed height keeps tabs uniform regardless of title length —
         otherwise the vertical writing-mode lets long epic names blow the
         tab up and push others off-screen. */
      height: 170px;
      overflow: hidden;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .archive-tab:hover {
      color: var(--lc-amber);
      border-color: var(--lc-amber);
    }

    .archive-tab.active {
      background: var(--lc-amber);
      color: var(--lc-bg);
      border-color: var(--lc-amber);
    }

    .archive-tab-title {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 0;
      flex: 1 1 0;
    }

    .archive-tab-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .archive-tab-priority {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 1px 6px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    /* Column opened from the archive rail gets a subtle amber marker */
    .column.archive-open {
      border-left: 2px solid var(--lc-amber);
    }

    .column {
      flex: 1 1 0;
      min-width: 240px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--lc-line);
      overflow: hidden;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease, order 0.4s ease;
    }

    .column:first-child { border-left: none; }

    /* Inset rounded-rectangle epic card */
    .column-header {
      position: relative;
      margin: 10px 10px 6px 10px;
      padding: 8px 12px;
      background: var(--lc-surface);
      border-radius: 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-height: 2.2rem;
      flex-shrink: 0;
      transition: opacity 0.5s ease, background 0.4s ease;
    }

    /* Glowing ring icon (reuses existing .column-status, swaps out the glyph) */
    .column-header .column-status {
      font-size: 0;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--lc-dim);
      box-shadow: 0 0 6px var(--lc-dim);
      flex-shrink: 0;
    }
    .column-header .column-status.s-open        { border-color: var(--lc-dim);    box-shadow: 0 0 6px var(--lc-dim); }
    .column-header .column-status.s-in_progress { border-color: var(--lc-amber);  box-shadow: 0 0 8px var(--lc-amber); animation: lc-dot-pulse 1.6s ease-in-out infinite; }
    .column-header .column-status.s-closed      { border-color: var(--lc-green);  box-shadow: 0 0 8px var(--lc-green); }
    .column-header .column-status.s-cancelled   { border-color: var(--lc-rust);   box-shadow: 0 0 8px var(--lc-rust); }

    @keyframes lc-dot-pulse {
      0%, 100% { box-shadow: 0 0 6px var(--lc-amber); }
      50%      { box-shadow: 0 0 14px var(--lc-amber); }
    }

    .column-title {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.5px;
      color: var(--lc-ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .column-priority {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 2px 9px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .column-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--lc-dim);
      flex-shrink: 0;
    }

    .column-tasks {
      flex: 1;
      overflow-y: auto;
      padding: 4px 12px 8px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--lc-line) transparent;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .column-tasks::-webkit-scrollbar { width: 4px; }
    .column-tasks::-webkit-scrollbar-track { background: transparent; }
    .column-tasks::-webkit-scrollbar-thumb { background: var(--lc-line); border-radius: 2px; }

    /* ══════════════════════════════════════════════
       Task rows
       ══════════════════════════════════════════════ */
    .task {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.35;
      color: var(--lc-ink);
      border-left: 3px solid transparent;
      transition: background 0.15s ease, opacity 0.6s ease, box-shadow 0.2s ease;
    }

    .task:hover { background: rgba(255,255,255,0.04); }

    @media (prefers-color-scheme: light) {
      .task:hover { background: rgba(0,0,0,0.04); }
    }

    .task-status {
      flex-shrink: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1;
      width: 14px;
      text-align: center;
      transition: color 0.4s ease;
    }

    .task-title {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.2px;
    }

    .task-priority {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 1px 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .task-claimed {
      display: block;
      padding: 0 0.75rem 0.3rem 1.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lc-dim);
      letter-spacing: 0.5px;
    }

    /* Status colours on the task status glyph */
    .s-open        { color: var(--lc-dim); }
    .s-in_progress { color: var(--lc-amber); }
    .s-closed      { color: var(--lc-green); }
    .s-cancelled   { color: var(--lc-rust); }

    /* In-progress tasks: amber left-rail pulse (matches lcars.jsx .wa-pulse) */
    .task.task-in-progress {
      animation: lc-task-pulse 1.6s ease-in-out infinite;
    }
    @keyframes lc-task-pulse {
      0%, 100% { box-shadow: inset 3px 0 0 rgba(255,176,46,0.55); background: rgba(255,176,46,0.02); }
      50%      { box-shadow: inset 3px 0 0 rgba(255,176,46,1);    background: rgba(255,176,46,0.07); }
    }

    /* Priority pills — solid coloured chip */
    .pr-P0 { background: var(--lc-red);    color: var(--lc-chip-ink); }
    .pr-P1 { background: var(--lc-amber);  color: var(--lc-chip-ink); }
    .pr-P2 { background: var(--lc-cyan);   color: var(--lc-chip-ink); }
    .pr-P3 { background: var(--lc-purple); color: var(--lc-chip-ink); }
    .pr-P4 { background: var(--lc-dim);    color: var(--lc-chip-ink); }

    .task-closed { opacity: 0.38; }
    .task-closed .task-title {
      text-decoration: line-through;
      text-decoration-color: rgba(122,125,138,0.5);
      color: var(--lc-dim);
    }
    .task-cancelled {
      opacity: 0.28;
      text-decoration: line-through;
    }

    /* Sub-group tasks (phase tasks) */
    .task-group {
      font-weight: 500;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px dashed var(--lc-line);
    }
    .task-group:first-child { margin-top: 0; padding-top: 0; border-top: none; }

    .task-group-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lc-dim);
      flex-shrink: 0;
    }

    /* P0 open/in-progress task — red left stripe */
    @keyframes lc-p0-attention {
      0%, 100% { box-shadow: inset 4px 0 0 var(--lc-red); }
      50%      { box-shadow: inset 4px 0 0 rgba(255,77,109,0.3); }
    }
    .task-attention { animation: lc-p0-attention 2.2s ease-in-out infinite; }

    .column-header-closed { opacity: 0.4; }

    /* ══════════════════════════════════════════════
       Mini progress bar (epic / group / initiative)
       ══════════════════════════════════════════════ */
    .mini-progress {
      display: inline-flex;
      width: 50px;
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      background: var(--lc-line);
      flex-shrink: 0;
      vertical-align: middle;
    }

    .mini-progress-seg { height: 100%; }
    .mini-progress-done { background: var(--lc-green); }
    .mini-progress-wip  { background: var(--lc-amber); }
    .mini-progress-open { background: var(--lc-dim); opacity: 0.4; }

    /* ══════════════════════════════════════════════
       Collapsed completed columns
       ══════════════════════════════════════════════ */
    .column.collapsed {
      flex: 0 0 48px;
      min-width: 48px;
      max-width: 48px;
      cursor: pointer;
    }

    .column.collapsed .column-tasks {
      opacity: 0;
      height: 0;
      overflow: hidden;
      padding: 0;
      transition: opacity 0.3s ease;
    }

    .column.collapsed .column-header {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      padding: 10px 6px;
      margin: 8px 6px;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      height: calc(100% - 16px);
      justify-content: flex-start;
    }

    .column.collapsed .column-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 60%;
    }

    .column.collapsed .column-priority,
    .column.collapsed .column-count,
    .column.collapsed .mini-progress {
      writing-mode: horizontal-tb;
    }

    .column.collapsed:hover {
      flex: 0 0 280px;
      min-width: 280px;
      max-width: 280px;
    }

    .column.collapsed:hover .column-tasks {
      opacity: 1;
      height: auto;
      padding: 4px 12px 8px 12px;
      overflow-y: auto;
    }

    .column.collapsed:hover .column-header {
      writing-mode: horizontal-tb;
      text-orientation: initial;
      padding: 8px 12px;
      margin: 10px 10px 6px 10px;
      flex-direction: row;
      flex-wrap: wrap;
      height: auto;
    }

    .column.collapsed:hover .column-title { max-height: none; }

    /* ══════════════════════════════════════════════
       Column groups (epics with sub-groups)
       ══════════════════════════════════════════════ */
    .column-group {
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--lc-line);
      overflow: hidden;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease;
    }

    .column-group:first-child { border-left: none; }

    .group-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 10px 10px 6px 10px;
      padding: 8px 12px;
      background: var(--lc-bg-2);
      border-left: 3px solid var(--lc-amber);
      border-radius: 8px;
      flex-shrink: 0;
      min-height: 1.8rem;
    }

    .group-header-closed { opacity: 0.4; }

    .group-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
    }

    .group-title {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      color: var(--lc-amber);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      text-transform: uppercase;
    }

    .group-priority {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .group-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lc-dim);
      flex-shrink: 0;
    }

    .group-columns {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .group-columns > .column {
      min-width: 200px;
      max-width: none;
      border-left: 1px solid var(--lc-line);
    }

    .group-columns > .column:first-child { border-left: none; }

    .column-group.collapsed {
      flex: 0 0 48px;
      min-width: 48px;
      max-width: 48px;
      cursor: pointer;
    }

    .column-group.collapsed .group-columns {
      opacity: 0;
      height: 0;
      overflow: hidden;
      transition: opacity 0.3s ease;
    }

    .column-group.collapsed .group-header {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      padding: 10px 6px;
      margin: 8px 6px;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      height: calc(100% - 16px);
      justify-content: flex-start;
    }

    .column-group.collapsed .group-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-height: 60%;
    }

    .column-group.collapsed .group-priority,
    .column-group.collapsed .group-count,
    .column-group.collapsed .mini-progress {
      writing-mode: horizontal-tb;
    }

    .column-group.collapsed:hover {
      flex: 0 0 600px;
      min-width: 600px;
      max-width: 80vw;
    }

    .column-group.collapsed:hover .group-columns {
      opacity: 1;
      height: auto;
    }

    .column-group.collapsed:hover .group-header {
      writing-mode: horizontal-tb;
      text-orientation: initial;
      padding: 8px 12px;
      margin: 10px 10px 6px 10px;
      flex-direction: row;
      flex-wrap: wrap;
      height: auto;
    }

    .column-group.collapsed:hover .group-title { max-height: none; }

    /* ══════════════════════════════════════════════
       Initiative banner + section (rust elbow plate)
       ══════════════════════════════════════════════ */
    .initiative-section {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: flex 0.4s ease, min-width 0.4s ease, max-width 0.4s ease;
      border-left: 1px solid var(--lc-line);
    }

    .initiative-section:first-child { border-left: none; }

    .initiative-section > .initiative-columns {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .initiative-section > .initiative-columns > .column,
    .initiative-section > .initiative-columns > .column-group {
      border-left: 1px solid var(--lc-line);
    }

    .initiative-section > .initiative-columns > :first-child {
      border-left: none;
    }

    .initiative-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 10px 4px 10px;
      padding: 6px 14px 6px 18px;
      background: var(--lc-rust);
      color: var(--lc-chip-ink);
      border-radius: 8px 8px 8px 24px;
      flex-shrink: 0;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      text-transform: uppercase;
    }

    .initiative-banner-closed { opacity: 0.45; }

    .initiative-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
      color: var(--lc-chip-ink);
    }

    .initiative-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      color: rgba(10,10,18,0.7);
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .initiative-title {
      font-weight: 800;
      font-size: 16px;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      color: var(--lc-chip-ink);
    }

    .initiative-priority {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 1px 8px;
      border-radius: 999px;
      flex-shrink: 0;
      background: rgba(10,10,18,0.22);
      color: var(--lc-chip-ink);
    }

    .initiative-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(10,10,18,0.75);
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════
       All-clear state
       ══════════════════════════════════════════════ */
    .all-clear {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 1.25rem;
      color: var(--lc-ink);
      border-top: 2px solid var(--lc-amber);
    }

    .all-clear.visible { display: flex; }

    .all-clear-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--lc-green);
      box-shadow: 0 0 24px rgba(62,224,138,0.55);
    }

    .all-clear-text {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 8px;
      color: var(--lc-green);
      text-transform: uppercase;
    }

    .all-clear-counts {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--lc-dim);
      letter-spacing: 1px;
    }

    .all-clear-elapsed {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--lc-amber);
      letter-spacing: 2px;
    }

    .all-clear-projects {
      display: none;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lc-chip-ink);
      background: var(--lc-amber);
      cursor: pointer;
      border: none;
      padding: 8px 22px;
      border-radius: 28px;
      transition: filter 0.15s ease;
      margin-top: 1rem;
    }

    .has-multiple-projects .all-clear-projects { display: inline-block; }

    .all-clear-projects:hover { filter: brightness(1.1); }

    /* ══════════════════════════════════════════════
       Elapsed timer (bottom-right pill)
       ══════════════════════════════════════════════ */
    .elapsed-timer {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      color: var(--lc-chip-ink);
      background: var(--lc-amber);
      border: none;
      border-radius: 24px;
      padding: 12px 28px;
      z-index: 200;
      display: none;
      letter-spacing: 1px;
      box-shadow: 0 0 12px rgba(255,176,46,0.25);
      cursor: pointer;
      user-select: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }

    .elapsed-timer:hover { filter: brightness(1.08); }
    .elapsed-timer:active { transform: scale(0.98); }

    .elapsed-timer.reset-flash {
      animation: elapsed-flash 0.6s ease;
    }

    @keyframes elapsed-flash {
      0%   { background: var(--lc-green); }
      100% { background: var(--lc-amber); }
    }

    .elapsed-timer.visible { display: block; }

    .elapsed-timer-label {
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(10,10,18,0.72);
      margin-bottom: 2px;
    }

    /* ══════════════════════════════════════════════
       Empty + reconnecting
       ══════════════════════════════════════════════ */
    .empty {
      padding: 1rem 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--lc-dim);
      font-style: italic;
      letter-spacing: 1px;
    }

    .reconnecting {
      position: fixed;
      bottom: 0.75rem;
      left: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lc-chip-ink);
      background: var(--lc-red);
      border: none;
      padding: 6px 14px;
      border-radius: 16px;
      display: none;
      animation: lc-blink 1.4s ease-in-out infinite;
    }

    .reconnecting.visible { display: block; }

    /* ══════════════════════════════════════════════
       Project sidebar
       ══════════════════════════════════════════════ */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 90;
    }

    .sidebar-overlay.visible { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 300px;
      background: var(--lc-bg-2);
      border-right: 2px solid var(--lc-amber);
      z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.2s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar.open { transform: translateX(0); }

    .sidebar-header {
      padding: 16px 18px;
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--lc-chip-ink);
      background: var(--lc-amber);
      letter-spacing: 3px;
      text-transform: uppercase;
      border-top-right-radius: 24px;
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .sidebar-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-template-rows: auto auto;
      align-items: center;
      gap: 0 0.6rem;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.15s ease;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--lc-ink);
    }

    .sidebar-item:hover { background: rgba(255,255,255,0.04); }

    @media (prefers-color-scheme: light) {
      .sidebar-item:hover { background: rgba(0,0,0,0.04); }
    }

    .sidebar-item.active {
      background: rgba(255,176,46,0.12);
      color: var(--lc-amber);
      border-left: 3px solid var(--lc-amber);
      padding-left: 15px;
    }

    .sidebar-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      grid-row: 1;
    }

    .sidebar-dot-active {
      background: var(--lc-amber);
      box-shadow: 0 0 8px var(--lc-amber);
      animation: lc-blink 2s ease-in-out infinite;
    }

    .sidebar-dot-idle  { background: var(--lc-dim); }
    .sidebar-dot-done  { background: var(--lc-green); box-shadow: 0 0 6px var(--lc-green); }
    .sidebar-dot-empty { background: var(--lc-line); }

    .sidebar-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-agents {
      font-size: 11px;
      color: var(--lc-amber);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    .sidebar-remove {
      opacity: 0;
      border: none;
      background: none;
      color: var(--lc-dim);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.2rem;
      transition: opacity 0.15s ease, color 0.15s ease;
    }

    .sidebar-item:hover .sidebar-remove { opacity: 1; }
    .sidebar-remove:hover { color: var(--lc-red); }

    .sidebar-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--lc-dim);
      font-size: 13px;
      line-height: 1.6;
      font-family: 'JetBrains Mono', monospace;
    }

    .sidebar-empty code {
      background: var(--lc-surface);
      color: var(--lc-amber);
      padding: 1px 6px;
      border-radius: 3px;
    }

    /* ══════════════════════════════════════════════
       Focus mode — hide closed/cancelled + collapsed
       ══════════════════════════════════════════════ */
    body.focus-active .task-closed,
    body.focus-active .task-cancelled { display: none; }
    body.focus-active .task-closed + .task-claimed,
    body.focus-active .task-cancelled + .task-claimed { display: none; }
    body.focus-active .column.collapsed,
    body.focus-active .column-group.collapsed,
    body.focus-active .archive-rail,
    body.focus-active .column.archive-open,
    body.focus-active .column-group.archive-open { display: none; }

    /* Responsive */
    @media (max-width: 1400px) {
      .summary-stat-number { font-size: 22px; }
      .summary-stat-label  { font-size: 10px; letter-spacing: 1px; }
      .summary-stat { padding: 5px 12px; gap: 8px; }
      .summary-stat-project .summary-stat-number { font-size: 22px; letter-spacing: 1.5px; }
      .focus-btn { font-size: 18px; padding: 5px 14px; }
    }

    @media (max-width: 900px) {
      .summary-stat-number { font-size: 18px; }
      .summary-stat-label  { font-size: 9px; letter-spacing: 0.5px; }
      .summary-stat { padding: 4px 8px; gap: 6px; }
      .summary-stat-project { min-width: 130px; padding: 8px 16px 8px 20px; }
      .summary-stat-project .summary-stat-number { font-size: 16px; letter-spacing: 1px; }
      .summary-stat-project .summary-stat-label { font-size: 10px; }
      .focus-btn { font-size: 14px; padding: 4px 10px; letter-spacing: 1px; }
    }

    /* ══════════════════════════════════════════════
       CRT scanlines + LCARS activity log
       (conservative enough for a Teams call)
       ══════════════════════════════════════════════ */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      background-image: repeating-linear-gradient(
        0deg,
        rgba(0,0,0,0.22) 0,
        rgba(0,0,0,0.22) 1px,
        transparent 1px,
        transparent 3px
      );
      opacity: 0.35;
      mix-blend-mode: multiply;
    }

    @media (prefers-color-scheme: light) {
      body::before { opacity: 0.12; }
    }

    .task,
    .task-claimed,
    .column-header,
    .column {
      transition-duration: 0.8s;
    }

    .demo-flash {
      background: rgba(255,176,46,0.28) !important;
      transition: background 0s !important;
    }

    .demo-epic-complete-flash {
      background: rgba(62,224,138,0.35) !important;
      transition: background 0s !important;
    }

    /* Activity log — LCARS panel at the bottom */
    .activity-ticker {
      display: flex;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 140px;
      background: var(--lc-bg);
      border-top: 1px solid var(--lc-line);
      z-index: 50;
      overflow: hidden;
    }

    .ticker-header {
      width: 140px;
      background: var(--lc-amber);
      color: var(--lc-chip-ink);
      font-family: 'Barlow Condensed', 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 24px 0 0;
      flex-shrink: 0;
    }

    .ticker-body {
      flex: 1;
      padding: 10px 16px;
      overflow-y: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: var(--lc-line) transparent;
    }

    .ticker-body::-webkit-scrollbar { width: 4px; }
    .ticker-body::-webkit-scrollbar-track { background: transparent; }
    .ticker-body::-webkit-scrollbar-thumb { background: var(--lc-line); border-radius: 2px; }

    .ticker-item {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 2px 0;
      color: var(--lc-ink);
    }

    .ticker-item:first-child {
      animation: lc-ticker-new 0.6s ease;
    }

    @keyframes lc-ticker-new {
      from { background: rgba(255,176,46,0.22); }
      to   { background: transparent; }
    }

    .ticker-time {
      color: var(--lc-dim);
      flex-shrink: 0;
      width: 72px;
    }

    .ticker-agent {
      color: var(--lc-cyan);
      font-weight: 500;
      flex-shrink: 0;
    }

    .ticker-desc {
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 10px;
      color: var(--lc-amber);
      width: 60px;
      align-self: center;
    }

    .ticker-title {
      color: var(--lc-ink);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ticker-status_change .ticker-desc  { color: var(--lc-amber); }
    .ticker-claimed       .ticker-desc  { color: var(--lc-cyan); }
    .ticker-epic_complete .ticker-desc  { color: var(--lc-green); }
    .ticker-new_task      .ticker-desc  { color: var(--lc-purple); }

    .board,
    .all-clear {
      margin-bottom: 140px;
    }
  </style>
</head>
<body>
  <div class="summary-bar" id="summary-bar">
    <div class="summary-top">
      <div class="summary-stat summary-stat-project" id="project-card">
        <span class="summary-stat-number" id="project-name">—<span class="project-chevron">▼</span></span>
        <span class="project-agents" id="project-agents"></span>
        <span class="summary-stat-label" id="project-time">—</span>
        <span class="header-status" id="status-dot"></span>
      </div>
      <div class="summary-stats" id="summary-stats"></div>
      <button class="focus-btn" id="focus-btn" title="Hide completed tasks and columns">focus</button>
    </div>
    <div class="summary-progress" id="summary-progress"></div>
  </div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="archive-rail" id="archive-rail"></div>
  </div>
  <div class="all-clear" id="all-clear">
    <span class="all-clear-dot"></span>
    <span class="all-clear-text">all clear</span>
    <span class="all-clear-counts" id="all-clear-counts"></span>
    <span class="all-clear-elapsed" id="all-clear-elapsed"></span>
    <button class="all-clear-projects" id="all-clear-projects">switch project</button>
  </div>
  <div class="elapsed-timer" id="elapsed-timer">
    <div class="elapsed-timer-label">elapsed</div>
    <div id="elapsed-timer-value"></div>
  </div>
  <div class="reconnecting" id="reconnecting">reconnecting&hellip;</div>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Projects</div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <script>
    const projectNameEl = document.getElementById("project-name");
    const projectAgentsEl = document.getElementById("project-agents");
    const projectTimeEl = document.getElementById("project-time");
    const boardEl = document.getElementById("board");
    const archiveRailEl = document.getElementById("archive-rail");
    const statusDot = document.getElementById("status-dot");
    const reconnectEl = document.getElementById("reconnecting");
    const allClearEl = document.getElementById("all-clear");
    const allClearCountsEl = document.getElementById("all-clear-counts");
    const summaryBarEl = document.getElementById("summary-bar");
    const summaryStatsEl = document.getElementById("summary-stats");
    const summaryProgressEl = document.getElementById("summary-progress");
    const focusBtnEl = document.getElementById("focus-btn");
    const projectCardEl = document.getElementById("project-card");
    const sidebarEl = document.getElementById("sidebar");
    const sidebarOverlayEl = document.getElementById("sidebar-overlay");
    const sidebarListEl = document.getElementById("sidebar-list");
    const elapsedTimerEl = document.getElementById("elapsed-timer");
    const elapsedTimerValueEl = document.getElementById("elapsed-timer-value");
    const allClearElapsedEl = document.getElementById("all-clear-elapsed");

    // ── Elapsed timer ──
    // Anchor = max(earliest claimed_at, server-side timerResetAt). The reset
    // lets the user rebase the timer when a project has been idle for weeks
    // and the "earliest claim" is no longer a meaningful start point.
    const projectStartTimes = new Map();
    const projectTimerResets = new Map();   // projectId -> Date

    function formatElapsed(ms) {
      const totalSec = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(totalSec / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (h > 0) return `${h}h ${String(m).padStart(2, "0")}m ${String(s).padStart(2, "0")}s`;
      if (m > 0) return `${m}m ${String(s).padStart(2, "0")}s`;
      return `${s}s`;
    }

    function earliestClaimTime(issues) {
      let earliest = null;
      for (const issue of issues) {
        if (issue.claimed_at) {
          const t = new Date(issue.claimed_at);
          if (!earliest || t < earliest) earliest = t;
        }
      }
      return earliest;
    }

    function getProjectStartTime(issues, resetAt) {
      const earliest = earliestClaimTime(issues);
      if (resetAt && earliest) return resetAt > earliest ? resetAt : earliest;
      return resetAt || earliest;
    }

    function getProjectEndTime(issues) {
      let latest = null;
      for (const issue of issues) {
        const t = issue.closed_at ? new Date(issue.closed_at) : null;
        if (t && (!latest || t > latest)) latest = t;
      }
      return latest;
    }

    function updateElapsedTimer() {
      const start = projectStartTimes.get(activeProjectId);
      if (!start) {
        elapsedTimerEl.classList.remove("visible");
        return;
      }
      elapsedTimerEl.classList.add("visible");
      elapsedTimerValueEl.textContent = formatElapsed(Date.now() - start.getTime());
    }

    setInterval(updateElapsedTimer, 1000);

    // Click the badge to rebase the anchor to "now" (server-side persisted).
    elapsedTimerEl.addEventListener("click", async () => {
      if (!activeProjectId) return;
      try {
        await fetch(`/api/projects/timer/reset?path=${encodeURIComponent(activeProjectId)}`, {
          method: "POST",
        });
        elapsedTimerEl.classList.remove("reset-flash");
        void elapsedTimerEl.offsetWidth;  // restart animation
        elapsedTimerEl.classList.add("reset-flash");
      } catch (e) {
        console.error("timer reset failed:", e);
      }
    });
    elapsedTimerEl.title = "Click to reset — rebases the timer to now";

    // ── Ops-terminal clock (HH:MM:SS UTC · OPS-01) ──
    function formatOpsClock(d) {
      const p = (n) => String(n).padStart(2, "0");
      return `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} UTC · OPS-01`;
    }

    function updateOpsClock() {
      projectTimeEl.textContent = formatOpsClock(new Date());
    }

    updateOpsClock();
    setInterval(updateOpsClock, 1000);

    // Activity ticker — LCARS panel with amber header on the left
    const activityLog = [];
    {
      const ticker = document.createElement("div");
      ticker.id = "activity-ticker";
      ticker.className = "activity-ticker";
      ticker.innerHTML = '<div class="ticker-header">Activity</div><div class="ticker-body" id="ticker-body"></div>';
      document.body.appendChild(ticker);
    }

    function renderActivityTicker() {
      const body = document.getElementById("ticker-body");
      if (!body) return;
      body.innerHTML = activityLog.slice(0, 30).map(a => {
        const time = new Date(a.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
        const agentStr = a.agent ? `<span class="ticker-agent">${esc(a.agent)}</span>` : "";
        return `<div class="ticker-item ticker-${a.type}"><span class="ticker-time">${time}</span><span class="ticker-desc">${esc(a.description)}</span>${agentStr}<span class="ticker-title">${esc(a.title)}</span></div>`;
      }).join("");
    }

    // ── Multi-project state ──
    const projectsData = new Map();   // projectPath -> { issues, status, config }
    let projectsList = [];             // [{id, name, status, path}, ...] from server
    let activeProjectId = null;

    // ── Active project persisted in ?project=<name> ──
    // We match on project name rather than path for a friendlier URL. If the
    // requested project isn't in the list yet (or ever), we fall back to the
    // default (first project) but remember the request so it still wins when
    // the project shows up later.
    let requestedProjectName = new URL(location.href).searchParams.get("project");

    function findProjectByName(name) {
      if (!name) return null;
      const lower = name.toLowerCase();
      return projectsList.find(p => p.name.toLowerCase() === lower) || null;
    }

    function updateProjectQueryParam(name) {
      const url = new URL(location.href);
      if (name) url.searchParams.set("project", name);
      else url.searchParams.delete("project");
      history.replaceState(null, "", url);
    }

    // Track which columns have been manually expanded (pinned open), per project.
    // Used by initiative-internal collapsed columns — loose completed epics use
    // openedArchive below instead.
    const pinnedColumnsPerProject = new Map();
    function getPinnedColumns() {
      if (!activeProjectId) return new Set();
      if (!pinnedColumnsPerProject.has(activeProjectId)) {
        pinnedColumnsPerProject.set(activeProjectId, new Set());
      }
      return pinnedColumnsPerProject.get(activeProjectId);
    }
    // Alias for existing code compatibility
    let pinnedColumns = new Set();

    // Which archive tab is currently opened (one at a time, per project).
    const openedArchivePerProject = new Map();
    let openedArchive = null;
    function loadOpenedArchive() {
      openedArchive = activeProjectId ? openedArchivePerProject.get(activeProjectId) || null : null;
    }
    function saveOpenedArchive() {
      if (!activeProjectId) return;
      if (openedArchive) openedArchivePerProject.set(activeProjectId, openedArchive);
      else openedArchivePerProject.delete(activeProjectId);
    }

    // Focus mode
    let focusMode = false;
    focusBtnEl.addEventListener("click", () => {
      focusMode = !focusMode;
      document.body.classList.toggle("focus-active", focusMode);
      focusBtnEl.classList.toggle("active", focusMode);
    });

    const STATUS_ICON = {
      open: "○",
      in_progress: "◐",
      closed: "✓",
      cancelled: "✕",
    };

    // ── Sidebar ──
    let sidebarOpen = false;

    function toggleSidebar() {
      sidebarOpen = !sidebarOpen;
      sidebarEl.classList.toggle("open", sidebarOpen);
      sidebarOverlayEl.classList.toggle("visible", sidebarOpen);
      document.body.classList.toggle("sidebar-open", sidebarOpen);
    }

    function closeSidebar() {
      sidebarOpen = false;
      sidebarEl.classList.remove("open");
      sidebarOverlayEl.classList.remove("visible");
      document.body.classList.remove("sidebar-open");
    }

    const allClearProjectsEl = document.getElementById("all-clear-projects");

    projectCardEl.addEventListener("click", toggleSidebar);
    allClearProjectsEl.addEventListener("click", toggleSidebar);
    sidebarOverlayEl.addEventListener("click", closeSidebar);

    function renderSidebar() {
      if (projectsList.length === 0) {
        sidebarListEl.innerHTML = '<div class="sidebar-empty">No projects registered.<br>Run <code>web-ait --client</code> from a project directory.</div>';
        return;
      }
      sidebarListEl.innerHTML = "";
      for (const p of projectsList) {
        const item = document.createElement("div");
        item.className = "sidebar-item" + (p.id === activeProjectId ? " active" : "");

        const dot = document.createElement("span");
        dot.className = "sidebar-dot sidebar-dot-" + (p.status || "empty");

        const name = document.createElement("span");
        name.className = "sidebar-name";
        name.textContent = p.name;

        const remove = document.createElement("button");
        remove.className = "sidebar-remove";
        remove.textContent = "✕";
        remove.title = "Remove project";
        remove.addEventListener("click", async (e) => {
          e.stopPropagation();
          await fetch(`/api/projects?path=${encodeURIComponent(p.id)}`, { method: "DELETE" });
        });

        item.appendChild(dot);
        item.appendChild(name);
        item.appendChild(remove);

        // Show active agent names
        const data = projectsData.get(p.id);
        const agents = getActiveAgents(data?.issues?.issues || []);
        if (agents.length > 0) {
          const agentEl = document.createElement("span");
          agentEl.className = "sidebar-agents";
          agentEl.style.gridColumn = "2";
          agentEl.textContent = agents.join(", ");
          item.appendChild(agentEl);
        }

        item.addEventListener("click", () => {
          switchToProject(p.id);
          closeSidebar();
        });
        sidebarListEl.appendChild(item);
      }
    }

    function switchToProject(projectId) {
      if (activeProjectId === projectId) return;
      // Save current pinned columns
      if (activeProjectId) {
        pinnedColumnsPerProject.set(activeProjectId, new Set(pinnedColumns));
        saveOpenedArchive();
      }
      activeProjectId = projectId;
      pinnedColumns = getPinnedColumns();
      loadOpenedArchive();
      // User-driven switch — overwrite any stale requested-project param so
      // the URL reflects the actual active project.
      const proj = projectsList.find(p => p.id === projectId);
      requestedProjectName = proj?.name || null;
      updateProjectQueryParam(requestedProjectName);
      // Clear board + archive rail for clean re-render
      boardEl.innerHTML = "";
      archiveRailEl.replaceChildren();
      const data = projectsData.get(projectId);
      if (data) render(data);
      renderSidebar();
    }

    // ── SSE with auto-reconnect ──
    let reconnectDelay = 1000;

    function connect() {
      const source = new EventSource("/events");

      source.onopen = () => {
        reconnectDelay = 1000;
        statusDot.classList.remove("disconnected");
        reconnectEl.classList.remove("visible");
      };

      source.addEventListener("projects", (e) => {
        projectsList = JSON.parse(e.data);
        document.body.classList.toggle("has-multiple-projects", projectsList.length > 1);
        // Auto-select a project if none active — prefer the one named in the
        // URL query param, otherwise fall back to the first project.
        if (!activeProjectId && projectsList.length > 0) {
          const requested = findProjectByName(requestedProjectName);
          const target = requested || projectsList[0];
          activeProjectId = target.id;
          requestedProjectName = target.name;
          updateProjectQueryParam(requestedProjectName);
          pinnedColumns = getPinnedColumns();
          loadOpenedArchive();
        }
        renderSidebar();
      });

      source.addEventListener("update", (e) => {
        const msg = JSON.parse(e.data);
        projectsData.set(msg.projectId, {
          issues: msg.issues,
          status: msg.status,
          config: msg.config,
        });
        if (msg.timerResetAt) projectTimerResets.set(msg.projectId, new Date(msg.timerResetAt));
        else projectTimerResets.delete(msg.projectId);
        // Render if this is the active project
        if (msg.projectId === activeProjectId) {
          render(projectsData.get(activeProjectId));

          // Flash changed tasks
          if (msg.changedTaskIds) {
            for (const taskId of msg.changedTaskIds) {
              const el = document.querySelector(`[data-task-id="${taskId}"]`);
              if (el) {
                el.classList.add("demo-flash");
                setTimeout(() => el.classList.remove("demo-flash"), 1500);
              }
            }
          }
          // Flash completed epic headers
          if (msg.completedEpicIds) {
            for (const epicId of msg.completedEpicIds) {
              const col = document.querySelector(`[data-id="${epicId}"]`);
              if (col) {
                const header = col.querySelector(".column-header, .group-header");
                if (header) {
                  header.classList.add("demo-epic-complete-flash");
                  setTimeout(() => header.classList.remove("demo-epic-complete-flash"), 2000);
                }
              }
            }
          }
        }
        // Update sidebar status indicators
        const proj = projectsList.find(p => p.id === msg.projectId);
        if (proj) {
          const data = projectsData.get(msg.projectId);
          const issues = data?.issues?.issues || [];
          const tasks = issues.filter(i => i.type === "task");
          if (tasks.length === 0) proj.status = "empty";
          else if (tasks.every(t => t.status === "closed" || t.status === "cancelled")) proj.status = "done";
          else if (tasks.some(t => t.status === "in_progress")) proj.status = "active";
          else proj.status = "idle";
          renderSidebar();
        }
      });

      // Activity ticker events
      source.addEventListener("activity", (e) => {
        const msg = JSON.parse(e.data);
        if (msg.projectId === activeProjectId) {
          activityLog.unshift(msg);
          if (activityLog.length > 50) activityLog.pop();
          renderActivityTicker();
        }
      });

      source.addEventListener("removed", (e) => {
        const msg = JSON.parse(e.data);
        projectsData.delete(msg.projectId);
        pinnedColumnsPerProject.delete(msg.projectId);
        openedArchivePerProject.delete(msg.projectId);
        projectTimerResets.delete(msg.projectId);
        projectStartTimes.delete(msg.projectId);
        // If we were viewing this project, switch to another
        if (activeProjectId === msg.projectId) {
          const fallback = projectsList.length > 0 ? projectsList[0] : null;
          activeProjectId = fallback?.id || null;
          requestedProjectName = fallback?.name || null;
          updateProjectQueryParam(requestedProjectName);
          pinnedColumns = getPinnedColumns();
          loadOpenedArchive();
          boardEl.innerHTML = "";
          if (activeProjectId) {
            const data = projectsData.get(activeProjectId);
            if (data) render(data);
          }
        }
      });

      source.onerror = () => {
        source.close();
        statusDot.classList.add("disconnected");
        reconnectEl.classList.add("visible");
        setTimeout(connect, reconnectDelay);
        reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      };
    }

    // ── Extract active agent names from issues ──
    function getActiveAgents(issues) {
      if (!issues) return [];
      const agents = new Set();
      for (const i of issues) {
        if (i.claimed_by && i.status !== "closed" && i.status !== "cancelled") {
          agents.add(i.claimed_by);
        }
      }
      return [...agents];
    }

    // ── Render with in-place DOM updates for smooth transitions ──
    function render(data) {
      const config = data.config || {};
      const counts = data.status?.counts || {};
      const issues = data.issues?.issues || [];

      // Track start time for elapsed timer — max(earliest claim, reset time).
      const resetAt = projectTimerResets.get(activeProjectId) || null;
      const startTime = getProjectStartTime(issues, resetAt);
      if (startTime) projectStartTimes.set(activeProjectId, startTime);
      else projectStartTimes.delete(activeProjectId);
      updateElapsedTimer();

      // Project card
      const prefix = config.prefix || "—";
      const basename = prefix.split("/").pop().replace(/[-_]/g, " ");
      projectNameEl.textContent = basename;
      const agents = getActiveAgents(issues);
      projectAgentsEl.textContent = agents.length > 0 ? agents.join(", ") : "";

      // ── Summary stat cards ──
      const allTasks = issues.filter(i => i.type === "task");
      const totalTasks = allTasks.length;
      const doneTasks = allTasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      const wipTasks = allTasks.filter(t => t.status === "in_progress").length;
      const openTasks = totalTasks - doneTasks - wipTasks;
      const readyCount = counts.ready ?? 0;
      const p0Urgent = allTasks.filter(t => t.priority === "P0" && (t.status === "open" || t.status === "in_progress")).length;

      function statCard(num, label, cls, extra) {
        return `<div class="summary-stat ${cls}${extra || ''}">`
          + `<span class="summary-stat-number">${num}</span>`
          + `<span class="summary-stat-label">${label}</span></div>`;
      }

      if (focusMode) {
        const remaining = totalTasks - doneTasks;
        summaryStatsEl.innerHTML = statCard(remaining, "remaining", "summary-stat-progress");
      } else {
        summaryStatsEl.innerHTML =
          statCard(openTasks, "open", "summary-stat-open") +
          statCard(wipTasks, "in-prog", "summary-stat-progress") +
          statCard(p0Urgent, "P0", "summary-stat-p0", p0Urgent > 0 ? " has-p0" : "") +
          statCard(doneTasks, "done", "summary-stat-done") +
          statCard(readyCount, "ready", "summary-stat-ready");
      }

      // Stacked progress bar
      const pctDone = totalTasks ? (doneTasks / totalTasks * 100) : 0;
      const pctWip = totalTasks ? (wipTasks / totalTasks * 100) : 0;
      const pctOpen = totalTasks ? (openTasks / totalTasks * 100) : 0;
      summaryProgressEl.innerHTML =
        `<div class="summary-progress-seg summary-progress-done" style="width:${pctDone}%"></div>` +
        `<div class="summary-progress-seg summary-progress-wip" style="width:${pctWip}%"></div>` +
        `<div class="summary-progress-seg summary-progress-open" style="width:${pctOpen}%"></div>`;

      // Group — build a tree that supports arbitrary nesting
      const issueMap = new Map();
      for (const i of issues) issueMap.set(i.id, i);

      // Map each parent to its direct children
      const childrenOf = new Map();
      for (const i of issues) {
        if (i.parent_id) {
          if (!childrenOf.has(i.parent_id)) childrenOf.set(i.parent_id, []);
          childrenOf.get(i.parent_id).push(i);
        }
      }

      const sortFn = (a, b) =>
        (a.priority || "P4").localeCompare(b.priority || "P4") ||
        a.created_at.localeCompare(b.created_at);

      // Flatten a subtree into an ordered list with depth/grouping metadata
      function flattenChildren(parentId, depth) {
        const kids = childrenOf.get(parentId) || [];
        kids.sort(sortFn);
        const result = [];
        for (const kid of kids) {
          const descendants = flattenChildren(kid.id, depth + 1);
          kid._depth = depth;
          kid._hasChildren = descendants.length > 0;
          if (kid._hasChildren) {
            kid._childCount = descendants.length;
            kid._doneCount = descendants.filter(t => t.status === "closed" || t.status === "cancelled").length;
          }
          result.push(kid);
          result.push(...descendants);
        }
        return result;
      }

      // Walk up parent chain to find root epic
      function findRootEpic(issue) {
        let current = issue;
        const visited = new Set();
        while (current.parent_id && !visited.has(current.parent_id)) {
          visited.add(current.parent_id);
          const parent = issueMap.get(current.parent_id);
          if (!parent) return null;
          if (parent.type === "epic") return parent;
          current = parent;
        }
        return null;
      }

      const initiatives = issues.filter(i => i.type === "initiative");
      initiatives.sort(sortFn);

      const epics = issues.filter(i => i.type === "epic");
      epics.sort(sortFn);

      // Find orphan tasks (no epic ancestor)
      const standalone = [];
      for (const i of issues) {
        if (i.type === "task" && !findRootEpic(i)) {
          i._depth = 0;
          i._hasChildren = false;
          standalone.push(i);
        }
      }
      standalone.sort(sortFn);

      // Helper: build a column entry for an epic
      function buildEpicEntry(epic) {
        const directKids = (childrenOf.get(epic.id) || []).slice().sort(sortFn);
        const hasSubGroups = directKids.some(k => (childrenOf.get(k.id) || []).length > 0);

        if (hasSubGroups) {
          const subColumns = [];
          const leafTasks = [];

          for (const kid of directKids) {
            const grandchildren = flattenChildren(kid.id, 0);
            if (grandchildren.length > 0) {
              subColumns.push({ issue: kid, children: grandchildren });
            } else {
              kid._depth = 0;
              kid._hasChildren = false;
              leafTasks.push(kid);
            }
          }

          if (leafTasks.length) {
            subColumns.unshift({
              issue: { title: "General", status: "open", priority: null, id: epic.id + "_general" },
              children: leafTasks,
            });
          }

          const allTasks = subColumns.flatMap(sc => sc.children);
          const allDone = allTasks.length > 0 && allTasks.every(t => t.status === "closed" || t.status === "cancelled");
          const isCompleted = epic.status === "closed" || epic.status === "cancelled" || allDone;

          return { epic, subColumns, grouped: true, completed: isCompleted };
        } else {
          const children = flattenChildren(epic.id, 0);
          const allDone = children.length > 0 && children.every(t => t.status === "closed" || t.status === "cancelled");
          const isCompleted = epic.status === "closed" || epic.status === "cancelled" || allDone;
          return { epic, children, grouped: false, completed: isCompleted };
        }
      }

      // Track which epics belong to an initiative
      const initiativeEpicIds = new Set();
      const initiativeSections = [];

      for (const init of initiatives) {
        const initEpics = epics.filter(e => e.parent_id === init.id);
        for (const e of initEpics) initiativeEpicIds.add(e.id);
        const entries = initEpics.map(buildEpicEntry);
        const activeEntries = entries.filter(e => !e.completed);
        const completedEntries = entries.filter(e => e.completed);
        initiativeSections.push({
          initiative: init,
          columns: [...activeEntries, ...completedEntries],
        });
      }

      // Build column data for epics NOT under an initiative
      const activeColumns = [];
      const completedColumns = [];

      for (const epic of epics) {
        if (initiativeEpicIds.has(epic.id)) continue;
        const entry = buildEpicEntry(epic);
        if (entry.completed) completedColumns.push(entry);
        else activeColumns.push(entry);
      }

      if (standalone.length) {
        activeColumns.push({
          epic: { title: "Standalone", status: "open", priority: null, id: "_standalone" },
          children: standalone,
          grouped: false,
          completed: false,
        });
      }

      // Loose completed epics no longer sit on the board — they live in the
      // archive rail. If one is currently opened, render it at the right end
      // of the main board (full column, not collapsed).
      if (openedArchive && !completedColumns.some(e => e.epic.id === openedArchive)) {
        // The opened epic is no longer completed (or was removed) — clear.
        openedArchive = null;
        saveOpenedArchive();
      }
      const openedEntry = openedArchive
        ? completedColumns.find(e => e.epic.id === openedArchive)
        : null;

      const columns = openedEntry ? [...activeColumns, openedEntry] : [...activeColumns];

      // All-clear state: no active columns and no standalone tasks
      const hasActiveInitiativeWork = initiativeSections.some(s => s.columns.some(e => !e.completed));
      const allClear = activeColumns.length === 0 && standalone.length === 0 && !hasActiveInitiativeWork && (epics.length > 0 || initiatives.length > 0);
      if (allClear) {
        boardEl.style.display = "none";
        summaryBarEl.style.display = "none";
        allClearEl.classList.add("visible");
        const total = issues.length;
        const closed = issues.filter(i => i.status === "closed").length;
        const cancelled = issues.filter(i => i.status === "cancelled").length;
        allClearCountsEl.textContent = `${closed} closed · ${cancelled} cancelled · ${total} total`;
        // Show total elapsed on all-clear — if reset happened after the last
        // close, endTime < startTime, so skip the label rather than show "0s".
        const endTime = getProjectEndTime(issues);
        if (startTime && endTime && endTime.getTime() > startTime.getTime()) {
          allClearElapsedEl.textContent = `completed in ${formatElapsed(endTime.getTime() - startTime.getTime())}`;
        } else {
          allClearElapsedEl.textContent = "";
        }
        elapsedTimerEl.classList.remove("visible");
        archiveRailEl.replaceChildren();
        return;
      } else {
        boardEl.style.display = "";
        summaryBarEl.style.display = "";
        allClearEl.classList.remove("visible");
      }

      // Reconcile board children (columns, groups, and initiative sections)
      const existingEls = boardEl.querySelectorAll(":scope > .column, :scope > .column-group, :scope > .initiative-section");
      const existingById = new Map();
      for (const el of existingEls) {
        existingById.set(el.dataset.id, el);
      }

      // Build the full ordered list of top-level board items
      const allBoardItems = [];

      // Initiative sections first
      for (const section of initiativeSections) {
        allBoardItems.push({ type: "initiative", id: section.initiative.id, section });
      }

      // Then loose columns
      for (const entry of columns) {
        allBoardItems.push({ type: entry.grouped ? "group" : "column", id: entry.epic.id, entry });
      }

      const newIds = new Set(allBoardItems.map(item => item.id));

      // Remove elements that no longer exist
      for (const el of existingEls) {
        if (!newIds.has(el.dataset.id)) el.remove();
      }

      // Update or create
      let prevEl = null;
      for (const item of allBoardItems) {
        let el = existingById.get(item.id);

        if (item.type === "initiative") {
          const { initiative, columns: initColumns } = item.section;
          if (el && el.classList.contains("initiative-section")) {
            updateInitiativeSection(el, initiative, initColumns);
          } else {
            if (el) el.remove();
            el = createInitiativeSection(initiative, initColumns);
            boardEl.appendChild(el);
          }
        } else if (item.type === "group") {
          const { epic, subColumns, completed } = item.entry;
          if (el && el.classList.contains("column-group")) {
            updateGroup(el, epic, subColumns);
          } else {
            if (el) el.remove();
            el = createGroup(epic, subColumns);
            boardEl.appendChild(el);
          }
          // Loose completed epics live in the archive rail. If we reach a
          // completed one here it's because the user opened it — show it
          // fully expanded with an amber accent.
          el.classList.remove("collapsed");
          el.classList.toggle("archive-open", !!completed);
        } else {
          const { epic, children, completed } = item.entry;
          if (el && !el.classList.contains("column-group") && !el.classList.contains("initiative-section")) {
            updateColumn(el, epic, children);
          } else {
            if (el) el.remove();
            el = createColumn(epic, children);
            boardEl.appendChild(el);
          }
          el.classList.remove("collapsed");
          el.classList.toggle("archive-open", !!completed);
        }

        // Ensure order
        if (prevEl && prevEl.nextElementSibling !== el) {
          prevEl.after(el);
        }
        prevEl = el;
      }

      // Archive rail — always after the board reconcile so "active" state
      // reflects any change to openedArchive.
      renderArchiveRail(completedColumns);
    }

    // ── Archive rail ──
    // Builds the rail of vertical tabs for loose completed epics. Clicking a
    // tab toggles openedArchive (single-open mode — clicking another swaps).
    function renderArchiveRail(completedEntries) {
      // Sort stable by title so tabs don't jump around as status hashes change.
      const entries = [...completedEntries].sort((a, b) => {
        return (a.epic.title || "").localeCompare(b.epic.title || "");
      });

      archiveRailEl.replaceChildren();
      for (const entry of entries) {
        const { epic } = entry;
        const children = entry.grouped
          ? entry.subColumns.flatMap(sc => sc.children)
          : entry.children;
        const done = children.filter(t => t.status === "closed" || t.status === "cancelled").length;

        const tab = document.createElement("button");
        tab.type = "button";
        tab.className = "archive-tab" + (openedArchive === epic.id ? " active" : "");
        tab.dataset.id = epic.id;
        tab.title = epic.title || "";

        if (epic.priority) {
          const prio = document.createElement("span");
          prio.className = `archive-tab-priority pr-${epic.priority}`;
          prio.textContent = epic.priority;
          tab.appendChild(prio);
        }

        const title = document.createElement("span");
        title.className = "archive-tab-title";
        title.textContent = epic.title || "";
        tab.appendChild(title);

        if (children.length) {
          const count = document.createElement("span");
          count.className = "archive-tab-count";
          count.textContent = `${done}/${children.length}`;
          tab.appendChild(count);
        }

        tab.addEventListener("click", () => {
          const willOpen = openedArchive !== epic.id;
          openedArchive = willOpen ? epic.id : null;
          saveOpenedArchive();
          const data = projectsData.get(activeProjectId);
          if (data) render(data);
          if (willOpen) {
            const opened = boardEl.querySelector(`[data-id="${epic.id}"]`);
            opened?.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "end" });
          }
        });

        archiveRailEl.appendChild(tab);
      }
    }

    // ── Helpers for mini progress bars ──
    function buildMiniProgress(tasks) {
      const total = tasks.length;
      if (!total) return null;
      const done = tasks.filter(t => t.status === "closed" || t.status === "cancelled").length;
      const wip = tasks.filter(t => t.status === "in_progress").length;
      const open = total - done - wip;

      const bar = document.createElement("span");
      bar.className = "mini-progress";
      bar.innerHTML =
        `<span class="mini-progress-seg mini-progress-done" style="width:${done/total*100}%"></span>` +
        `<span class="mini-progress-seg mini-progress-wip" style="width:${wip/total*100}%"></span>` +
        `<span class="mini-progress-seg mini-progress-open" style="width:${open/total*100}%"></span>`;
      return bar;
    }

    function createColumn(epic, children) {
      const col = document.createElement("div");
      col.className = "column";
      col.dataset.id = epic.id;

      // Click to toggle pin on collapsed columns
      col.addEventListener("click", () => {
        if (col.classList.contains("collapsed")) {
          pinnedColumns.add(epic.id);
          col.classList.remove("collapsed");
        } else if (pinnedColumns.has(epic.id)) {
          pinnedColumns.delete(epic.id);
          col.classList.add("collapsed");
        }
      });

      const header = document.createElement("div");
      header.className = "column-header" + (epic.status === "closed" ? " column-header-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `column-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const titleSpan = document.createElement("span");
      titleSpan.className = "column-title";
      titleSpan.title = epic.title || "";
      titleSpan.textContent = epic.title || "";

      header.appendChild(statusSpan);
      header.appendChild(titleSpan);

      if (epic.priority) {
        const prSpan = document.createElement("span");
        prSpan.className = `column-priority pr-${epic.priority}`;
        prSpan.textContent = epic.priority;
        header.appendChild(prSpan);
      }

      const countSpan = document.createElement("span");
      countSpan.className = "column-count";
      const doneCount = children.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${children.length}`;
      header.appendChild(countSpan);

      const miniBar = buildMiniProgress(children);
      if (miniBar) header.appendChild(miniBar);

      col.appendChild(header);

      const tasksDiv = document.createElement("div");
      tasksDiv.className = "column-tasks";
      for (const t of children) {
        appendTask(tasksDiv, t);
      }
      if (!children.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no tasks";
        tasksDiv.appendChild(empty);
      }
      col.appendChild(tasksDiv);

      return col;
    }

    function updateColumn(col, epic, children) {
      // Update header
      const header = col.querySelector(".column-header");
      header.className = "column-header" + (epic.status === "closed" ? " column-header-closed" : "");

      const statusSpan = header.querySelector(".column-status");
      statusSpan.className = `column-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";

      const countSpan = header.querySelector(".column-count");
      const doneCount = children.filter(t => t.status === "closed" || t.status === "cancelled").length;
      countSpan.textContent = `${doneCount}/${children.length}`;

      // Update mini progress bar
      const oldMini = header.querySelector(".mini-progress");
      const newMini = buildMiniProgress(children);
      if (oldMini && newMini) oldMini.replaceWith(newMini);
      else if (newMini) header.appendChild(newMini);
      else if (oldMini) oldMini.remove();

      // Reconcile tasks
      const tasksDiv = col.querySelector(".column-tasks");
      const existingTasks = tasksDiv.querySelectorAll("[data-task-id]");
      const existingById = new Map();
      for (const el of existingTasks) {
        existingById.set(el.dataset.taskId, el);
      }

      // Remove empty placeholder if present
      const emptyEl = tasksDiv.querySelector(".empty");
      if (emptyEl && children.length) emptyEl.remove();

      const newIds = new Set(children.map(t => t.id));

      // Remove tasks no longer present (and their claimed spans)
      for (const el of existingTasks) {
        if (!newIds.has(el.dataset.taskId)) {
          // Remove following claimed span if present
          const next = el.nextElementSibling;
          if (next && next.classList.contains("task-claimed")) next.remove();
          el.remove();
        }
      }

      // Update or create tasks in order
      let prevEl = null;
      for (const t of children) {
        let taskEl = existingById.get(t.id);
        if (taskEl) {
          updateTask(taskEl, t);
        } else {
          taskEl = createTaskEl(t);
          tasksDiv.appendChild(taskEl);
        }
        // Ensure order
        if (prevEl) {
          // prevEl might be followed by a claimed span — skip past it
          let insertAfter = prevEl;
          if (insertAfter.nextElementSibling?.classList.contains("task-claimed")) {
            insertAfter = insertAfter.nextElementSibling;
          }
          if (insertAfter.nextElementSibling !== taskEl) {
            insertAfter.after(taskEl);
          }
        }
        prevEl = taskEl;
        // Move claimed span right after if present
        const claimedSpan = tasksDiv.querySelector(`[data-claimed-for="${t.id}"]`);
        if (claimedSpan && claimedSpan.previousElementSibling !== taskEl) {
          taskEl.after(claimedSpan);
        }
      }

      // Add empty placeholder if no children
      if (!children.length && !tasksDiv.querySelector(".empty")) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "no tasks";
        tasksDiv.appendChild(empty);
      }
    }

    function createGroup(epic, subColumns) {
      const group = document.createElement("div");
      group.className = "column-group";
      group.dataset.id = epic.id;
      group.style.flex = `${subColumns.length} 1 0`;
      group.style.minWidth = `${subColumns.length * 200}px`;

      // Click to toggle pin (same pattern as columns)
      group.addEventListener("click", () => {
        if (group.classList.contains("collapsed")) {
          pinnedColumns.add(epic.id);
          group.classList.remove("collapsed");
        } else if (pinnedColumns.has(epic.id)) {
          pinnedColumns.delete(epic.id);
          group.classList.add("collapsed");
        }
      });

      const header = document.createElement("div");
      header.className = "group-header" + (epic.status === "closed" ? " group-header-closed" : "");

      const statusSpan = document.createElement("span");
      statusSpan.className = `group-status s-${epic.status}`;
      statusSpan.textContent = STATUS_ICON[epic.status] || "○";
      header.appendChild(statusSpan);
